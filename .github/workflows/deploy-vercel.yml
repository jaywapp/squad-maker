name: Deploy to Vercel

on:
  push:
    branches:
      - main

concurrency:
  group: squad-maker-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Test and deploy
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_CLI_VERSION: 56.4.1
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm test

      - name: Pull Vercel production settings
        run: npx --yes vercel@${VERCEL_CLI_VERSION} pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build production output
        run: npx --yes vercel@${VERCEL_CLI_VERSION} build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt production output
        run: npx --yes vercel@${VERCEL_CLI_VERSION} deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
