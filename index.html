<meta property="og:type"        content="website">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0f172a;
  color: #f1f5f9;
  font-family: 'Segoe UI', Tahoma, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 16px 40px;
  gap: 10px;
}

h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; }

/* ── 공통 최대 너비 ── */
.team-setup, .squad-tabs, .formation-bar, .notes-wrap, #fieldWrapper, #readonlyBanner {
  width: 100%; max-width: 480px;
}

/* ── 팀 설정 카드 ── */
.team-setup {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.setup-row { display: flex; align-items: center; gap: 8px; }
.setup-label { font-size: 0.75rem; font-weight: 700; color: #64748b; white-space: nowrap; }
.team-name-input {
  flex: 1;
  padding: 7px 12px;
  border: 1px solid #334155; border-radius: 8px;
  background: #0f172a; color: white; font-size: 0.9rem; outline: none;
}
.team-name-input:focus { border-color: #60a5fa; }
.team-name-input::placeholder { color: #334155; }

/* ── 인원수 pills ── */
.mode-pills {
  display: flex; flex-wrap: wrap;
  background: #0f172a; border: 1px solid #334155; border-radius: 8px; overflow: hidden;
  flex: 1;
}
.mode-pill {
  flex: 1;
  padding: 6px 4px; border: none; background: none;
  color: #64748b; font-size: 0.75rem; font-weight: 700; cursor: pointer;
  transition: background 0.15s, color 0.15s; white-space: nowrap; text-align: center;
}
.mode-pill:not(:last-child) { border-right: 1px solid #334155; }
.mode-pill.active { background: #3b82f6; color: white; }

/* ── 포메이션 셀렉트 ── */
.formation-select {
  padding: 6px 10px; border: 1px solid #334155; border-radius: 8px;
  background: #0f172a; color: white; font-size: 0.82rem; font-weight: 600;
  outline: none; cursor: pointer;
}

/* ── 스쿼드 서브탭 ── */
.squad-tabs {
  display: flex;
  background: #1e293b; border: 1px solid #334155; border-radius: 10px; overflow: hidden;
}
.squad-tab {
  flex: 1; padding: 10px 6px; border: none; background: none;
  color: #64748b; font-size: 0.82rem; font-weight: 700; cursor: pointer;
  transition: background 0.15s, color 0.15s; text-align: center;
}
.squad-tab:not(:last-child) { border-right: 1px solid #334155; }
.squad-tab[data-squad="basic"].active   { background: #1d4ed8; color: white; }
.squad-tab[data-squad="attack"].active  { background: #c2410c; color: white; }
.squad-tab[data-squad="defense"].active { background: #1e40af; color: white; }

/* ── 포메이션 바 ── */
.formation-bar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
}
.squad-badge {
  font-size: 0.78rem; font-weight: 700; padding: 4px 12px;
  border-radius: 20px; white-space: nowrap;
}
.squad-badge.basic   { background: #1d4ed8; color: white; }
.squad-badge.attack  { background: #c2410c; color: white; }
.squad-badge.defense { background: #1e40af; color: white; }

/* ── Field ── */
#fieldWrapper {
  position: relative; width: 480px; height: 660px; flex-shrink: 0;
}
#field {
  position: absolute; top: 0; left: 0;
  width: 480px; height: 660px; border-radius: 6px;
  background: #276d41; box-shadow: 0 8px 32px rgba(0,0,0,0.6); overflow: hidden;
}
#field::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(
    to bottom, transparent 0, transparent 44px,
    rgba(0,0,0,0.07) 44px, rgba(0,0,0,0.07) 88px
  );
  pointer-events: none; z-index: 0;
}
.fl { position:absolute; background:rgba(255,255,255,0.8); pointer-events:none; z-index:1; }
.fc { position:absolute; border:2px solid rgba(255,255,255,0.8); border-radius:50%; pointer-events:none; z-index:1; }
.fd { position:absolute; background:rgba(255,255,255,0.8); border-radius:50%; pointer-events:none; z-index:1; }

/* ── Players ── */
.player {
  position:absolute; width:60px; text-align:center;
  transform:translate(-50%,-50%);
  cursor:grab; user-select:none; z-index:10; touch-action:none;
}
.player.dragging { cursor:grabbing; z-index:50; }
.player-circle {
  width:44px; height:44px; border-radius:50%; margin:0 auto;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:0.85rem;
  border:2.5px solid rgba(255,255,255,0.9); color:white;
  box-shadow:0 3px 10px rgba(0,0,0,0.5); transition:transform 0.1s;
}
.player-circle:hover { transform:scale(1.08); }
.player-name {
  font-size:0.65rem; font-weight:600; color:white;
  text-shadow:0 1px 4px rgba(0,0,0,1); margin-top:3px;
  white-space:nowrap; max-width:68px; overflow:hidden; text-overflow:ellipsis;
}

/* ── Controls ── */
.controls { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; width:100%; max-width:480px; }
.btn {
  padding:9px 16px; border:none; border-radius:8px;
  cursor:pointer; font-size:0.85rem; font-weight:600;
  transition:opacity 0.15s, transform 0.1s;
}
.btn:hover  { opacity:0.85; transform:translateY(-1px); }
.btn:active { transform:translateY(0); }
.btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
.btn-green  { background:#22c55e; color:white; }
.btn-blue   { background:#3b82f6; color:white; }
.btn-slate  { background:#475569; color:white; }
.btn-orange { background:#f97316; color:white; }

/* ── Context menu ── */
#ctxMenu {
  position:fixed; background:#1e293b; border:1px solid #334155;
  border-radius:10px; padding:10px; z-index:1000; display:none;
  box-shadow:0 8px 24px rgba(0,0,0,0.6); min-width:168px;
}
#ctxMenu.visible { display:block; }
.ctx-label { font-size:0.72rem; color:#94a3b8; margin-bottom:8px; font-weight:600; }
.color-palette { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.swatch {
  width:24px; height:24px; border-radius:50%; cursor:pointer;
  border:2px solid transparent; transition:transform 0.1s;
}
.swatch:hover { transform:scale(1.25); border-color:white; }
.swatch.active { border-color:white; transform:scale(1.2); }
.ctx-btn {
  display:block; width:100%; padding:7px 10px;
  background:none; border:none; color:#f1f5f9;
  text-align:left; cursor:pointer; font-size:0.85rem;
  border-radius:6px; transition:background 0.1s;
}
.ctx-btn:hover { background:#334155; }
.ctx-btn.danger { color:#f87171; }
.ctx-divider { height:1px; background:#334155; margin:6px 0; }

/* ── Notes ── */
.notes-wrap {
  display:flex; flex-direction:column; gap:10px;
}
.notes-card {
  background:#1e293b; border:1px solid #334155; border-radius:12px; padding:14px;
}
.notes-card-title {
  font-size:0.72rem; font-weight:700; color:#64748b;
  text-transform:uppercase; letter-spacing:0.05em; margin-bottom:10px;
}
.notes-textarea {
  width:100%; padding:10px 12px;
  border:1px solid #334155; border-radius:8px;
  background:#0f172a; color:#e2e8f0;
  font-size:0.85rem; font-family:inherit; line-height:1.6;
  outline:none; resize:vertical; min-height:76px;
  transition:border-color 0.15s;
}
.notes-textarea:focus { border-color:#475569; }
.notes-textarea::placeholder { color:#1e3a5f; }

.player-note-list { display:flex; flex-direction:column; gap:8px; }
.player-note-row { display:flex; flex-direction:column; gap:4px; }
.player-note-header {
  display:flex; align-items:center; gap:7px;
  font-size:0.78rem; font-weight:600; color:#94a3b8;
}
.player-note-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.player-note-input {
  width:100%; padding:7px 10px;
  border:1px solid #1e293b; border-radius:6px;
  background:#0f172a; color:#cbd5e1;
  font-size:0.8rem; font-family:inherit; line-height:1.5;
  outline:none; resize:none; height:48px;
  transition:border-color 0.15s;
}
.player-note-input:focus { border-color:#334155; }
.player-note-input::placeholder { color:#1e3a5f; }

/* ── Share modal ── */
#shareModal {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.75); z-index:2000;
  align-items:flex-start; justify-content:center;
  padding:20px 12px; overflow-y:auto;
}
#shareModal.visible { display:flex; }
.share-box {
  background:#1e293b; border:1px solid #334155; border-radius:14px;
  width:100%; max-width:480px; padding:20px;
  display:flex; flex-direction:column; gap:14px;
}
.share-box h3 { font-size:1rem; font-weight:700; }
.share-text {
  background:#0f172a; border:1px solid #334155; border-radius:8px;
  padding:14px; font-size:0.8rem; color:#cbd5e1;
  white-space:pre-wrap; word-break:break-word;
  max-height:50vh; overflow-y:auto; line-height:1.7;
  font-family:'Segoe UI', Tahoma, monospace;
}
.share-actions { display:flex; gap:8px; flex-wrap:wrap; }

/* ── 선수 시점 모달 ── */
#playerViewModal {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.8); z-index:2000;
  align-items:flex-start; justify-content:center;
  padding:16px; overflow-y:auto;
}
#playerViewModal.visible { display:flex; }
.pv-box {
  background:#0f172a; border:1px solid #334155; border-radius:16px;
  width:100%; max-width:480px; display:flex; flex-direction:column; overflow:hidden;
}
.pv-header {
  display:flex; align-items:center; gap:12px;
  padding:18px 20px; background:#1e293b; border-bottom:1px solid #334155;
}
.pv-avatar {
  width:48px; height:48px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:1.1rem; color:white;
  border:2.5px solid rgba(255,255,255,0.3);
}
.pv-header-info { flex:1; }
.pv-header-name { font-size:1.1rem; font-weight:800; }
.pv-header-num  { font-size:0.78rem; color:#64748b; margin-top:2px; }
.pv-close { background:none; border:none; color:#64748b; font-size:1.4rem; cursor:pointer; padding:4px; line-height:1; }
.pv-close:hover { color:#f87171; }
.pv-selector-wrap {
  padding:12px 20px; background:#1e293b; border-bottom:1px solid #334155;
  display:flex; align-items:center; gap:10px;
}
.pv-selector-wrap label { font-size:0.75rem; color:#64748b; font-weight:600; white-space:nowrap; }
.pv-selector {
  flex:1; padding:7px 10px;
  background:#0f172a; border:1px solid #334155; border-radius:8px;
  color:white; font-size:0.85rem; outline:none; cursor:pointer;
}
.pv-squads { padding:16px 20px; display:flex; flex-direction:column; gap:14px; }
.pv-squad-card { background:#1e293b; border:1px solid #334155; border-radius:12px; overflow:hidden; }
.pv-squad-header {
  display:flex; align-items:center; gap:8px;
  padding:10px 14px; border-bottom:1px solid #334155;
}
.pv-squad-title { font-size:0.82rem; font-weight:700; }
.pv-squad-form  { font-size:0.72rem; color:#64748b; margin-left:auto; }
.pv-squad-body  { padding:12px 14px; display:flex; flex-direction:column; gap:10px; }
.pv-field-wrap  { display:flex; gap:14px; align-items:flex-start; }
.pv-mini-field {
  position:relative; flex-shrink:0; width:140px; height:192px;
  border-radius:4px; background:#276d41; overflow:hidden;
  border:1px solid rgba(255,255,255,0.15);
}
.pv-mini-field::before {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(to bottom,transparent 0,transparent 13px,rgba(0,0,0,0.07) 13px,rgba(0,0,0,0.07) 26px);
  pointer-events:none;
}
.pv-mini-line { position:absolute; background:rgba(255,255,255,0.45); }
.pv-mini-dot  { position:absolute; border-radius:50%; transform:translate(-50%,-50%); }
.pv-mini-dot.other { width:8px;  height:8px;  background:rgba(255,255,255,0.3); }
.pv-mini-dot.self  { width:13px; height:13px; border:2px solid white; box-shadow:0 0 0 4px rgba(250,204,21,0.35); }
.pv-info { flex:1; display:flex; flex-direction:column; gap:8px; }
.pv-zone-badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:0.72rem; font-weight:700; background:#1d4ed8; color:#93c5fd; }
.pv-note-block { display:flex; flex-direction:column; gap:4px; }
.pv-note-label { font-size:0.7rem; color:#475569; font-weight:600; }
.pv-note-text  { font-size:0.8rem; color:#cbd5e1; line-height:1.6; white-space:pre-wrap; }
.pv-note-empty { font-size:0.78rem; color:#334155; font-style:italic; }

.share-divider { height:1px; background:#334155; }
.share-link-section { display:flex; flex-direction:column; gap:8px; }
.share-link-label { font-size:0.72rem; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:0.05em; }
.share-link-row { display:flex; gap:8px; align-items:center; }
.share-url-box {
  flex:1; padding:8px 10px;
  background:#0f172a; border:1px solid #334155; border-radius:8px;
  color:#64748b; font-size:0.72rem; outline:none;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  cursor:text; user-select:all;
}

/* ── 읽기 전용 배너 ── */
#readonlyBanner {
  display:none;
  background:#451a03; border:1px solid #f97316; border-radius:10px;
  padding:10px 14px; font-size:0.82rem; color:#fed7aa;
  text-align:center; font-weight:600;
}
#readonlyBanner.visible { display:block; }

.hint { font-size:0.72rem; color:#334155; }

/* ── 앱 모드 탭 ── */
.app-tabs {
  display:flex; width:100%; max-width:480px;
  background:#1e293b; border:1px solid #334155; border-radius:10px; overflow:hidden;
}
.app-tab {
  flex:1; padding:10px 6px; border:none; background:none;
  color:#64748b; font-size:0.85rem; font-weight:700; cursor:pointer;
  transition:background 0.15s, color 0.15s;
}
.app-tab:not(:last-child) { border-right:1px solid #334155; }
.app-tab.active { background:#3b82f6; color:white; }

.app-hidden { display:none !important; }

/* ── 공격 패턴 모드 ── */
#patternCanvas {
  position:absolute; top:0; left:0; width:480px; height:660px;
  border-radius:6px; box-shadow:0 8px 32px rgba(0,0,0,0.6);
  cursor:crosshair; display:none;
}
#patternUI { display:none; flex-direction:column; gap:10px; width:100%; max-width:480px; }
.pattern-bar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.pattern-name-input {
  width:160px; padding:7px 12px;
  border:1px solid #334155; border-radius:8px;
  background:#0f172a; color:white; font-size:0.9rem; outline:none;
}
.pattern-name-input:focus { border-color:#60a5fa; }
.pattern-nav {
  display:flex; align-items:center; gap:6px;
  background:#1e293b; border:1px solid #334155; border-radius:8px; padding:4px 8px;
}
.pattern-nav button {
  background:none; border:none; color:#94a3b8;
  font-size:1rem; cursor:pointer; padding:2px 6px;
  border-radius:4px; transition:background 0.1s;
}
.pattern-nav button:hover { background:#334155; color:white; }
.pattern-nav span { font-size:0.8rem; color:#cbd5e1; white-space:nowrap; }
.btn-amber  { background:#f59e0b; color:white; }
.btn-purple { background:#8b5cf6; color:white; }
.btn-red    { background:#ef4444; color:white; }

/* ── GIF 진행 오버레이 ── */
#gifProgress {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.7); z-index:2000;
  align-items:center; justify-content:center; flex-direction:column; gap:16px;
}
#gifProgress.visible { display:flex; }
#gifProgress p { color:white; font-weight:600; font-size:1rem; }
#gifProgressBar { width:240px; height:8px; background:#334155; border-radius:4px; overflow:hidden; }
#gifProgressFill { height:100%; background:#22c55e; border-radius:4px; transition:width 0.1s; }

/* ── 매치 전략 탭 ── */
#strategyUI { width:100%; max-width:480px; display:none; flex-direction:column; gap:12px; }
.strategy-card { background:#1e293b; border:1px solid #334155; border-radius:12px; padding:16px; }
.strategy-card h3 {
  font-size:0.85rem; font-weight:700; color:#94a3b8; margin-bottom:12px;
  text-transform:uppercase; letter-spacing:0.05em;
}
.strategy-form { display:flex; flex-direction:column; gap:10px; }
.strategy-field { display:flex; flex-direction:column; gap:4px; }
.strategy-field label { font-size:0.75rem; color:#64748b; font-weight:600; }
.strategy-input {
  padding:8px 12px; border:1px solid #334155; border-radius:8px;
  background:#0f172a; color:white; font-size:0.88rem; outline:none; font-family:inherit;
}
.strategy-input:focus { border-color:#60a5fa; }
.strategy-input::placeholder { color:#475569; }
textarea.strategy-input { resize:vertical; min-height:72px; line-height:1.5; }

.squad-summary { font-size:0.8rem; color:#94a3b8; line-height:1.8; }
.squad-summary .formation-badge {
  display:inline-block; background:#3b82f6; color:white;
  padding:2px 10px; border-radius:12px; font-weight:700; font-size:0.78rem; margin-bottom:8px;
}
.player-list { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
.player-chip {
  display:flex; align-items:center; gap:5px;
  background:#0f172a; border:1px solid #334155; border-radius:20px;
  padding:3px 10px; font-size:0.75rem;
}
.player-chip .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.pattern-chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
.pattern-chip {
  background:#0f172a; border:1px solid #f59e0b; color:#fbbf24;
  border-radius:20px; padding:3px 10px; font-size:0.75rem; font-weight:600;
}
.generate-row { display:flex; gap:8px; align-items:center; }

.output-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
.tactic-section { margin-bottom:14px; }
.tactic-section-title {
  color:#60a5fa; font-weight:700; font-size:0.85rem;
  border-bottom:1px solid #1e293b; padding-bottom:4px; margin-bottom:8px;
}
.tactic-player-title { color:#fbbf24; font-weight:700; font-size:0.82rem; margin:10px 0 3px; }
.tactic-line { color:#cbd5e1; font-size:0.8rem; line-height:1.7; padding-left:12px; }
.tactic-line::before { content:'· '; color:#475569; }
.tactic-tag {
  display:inline-block; background:#1e3a5f; color:#93c5fd;
  border-radius:10px; padding:1px 8px; font-size:0.72rem; font-weight:600; margin-left:4px;
}
.tactic-tag.green { background:#14532d; color:#86efac; }
.tactic-tag.amber { background:#451a03; color:#fde68a; }
.tactic-tag.red   { background:#450a0a; color:#fca5a5; }

/* ── 토스트 알림 ── */
.toast {
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
  background:#1e293b; border:1px solid #334155; color:#f1f5f9;
  padding:8px 18px; border-radius:8px; font-size:0.82rem; font-weight:600;
  z-index:3000; pointer-events:none; opacity:0; transition:opacity 0.3s;
}
.toast.visible { opacity:1; }

/* ── 접근성: 포커스 링 ── */
:focus-visible {
  outline: 2px solid #60a5fa;
  outline-offset: 2px;
}
.formation-select:focus-visible,
.team-name-input:focus-visible { outline: 2px solid #60a5fa; }

/* 스크린리더 전용 텍스트 */
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* ── 반응형 ── */
@media (max-width: 500px) {
  body { padding: 10px 10px 40px; }
  /* 인원 pills: 두 줄로 래핑, 터치 영역 확보 */
  .mode-pill { min-width: 44px; min-height: 44px; padding: 8px 2px; font-size: 0.7rem; }
  .mode-pill:not(:last-child) { border-right: none; border-bottom: 1px solid #334155; }
  .mode-pills { flex-wrap: wrap; }
  /* 포메이션 바 줄바꿈 허용 */
  .formation-bar { flex-wrap: wrap; }
  /* 필드: 480px 유지(JS 좌표계 보존), 부모가 스크롤 허용 */
  #fieldWrapper { overflow-x: auto; }
}

/* 데스크톱: 좌우 여백에 약간의 padding 추가로 답답함 해소 */
@media (min-width: 960px) {
  body { max-width: 960px; margin: 0 auto; }
}
</style>

// 앱 모드: 'squad' | 'pattern' | 'strategy'
let appMode = 'squad';

// 공격 패턴 — moves: { rosterId: {toX, toY} }, 시작 위치는 현재 스쿼드 배치에서 실시간 참조
let patterns = [{ name: '패턴 1', moves: {} }];
let currentPatternIdx = 0;

// 패턴 애니메이션 / 경로 드로잉
const PLAYER_R = 22;
const ANIM_MS = 2200;
let animRaf = null, animStart = null, isPlaying = false;
let drawState = null; // { playerId, fromX, fromY, curX, curY }

// ═══════════════════════════════════════════════════════════════
// APP MODE (스쿼드 / 공격 패턴 / 매치 전략)
// ═══════════════════════════════════════════════════════════════
function setAppMode(mode) {
  if (mode === appMode) return;
  if (appMode === 'squad') saveCurrentNotes();
  appMode = mode;

  document.querySelectorAll('.app-tab').forEach(t => {
    const isActive = t.dataset.app === mode;
    t.classList.toggle('active', isActive);
    t.setAttribute('aria-selected', isActive ? 'true' : 'false');
  });
  document.querySelectorAll('.app-squad-only').forEach(el =>
    el.classList.toggle('app-hidden', mode !== 'squad'));

  document.getElementById('fieldWrapper').style.display  = mode === 'strategy' ? 'none' : '';
  document.getElementById('field').style.display         = mode === 'squad'    ? '' : 'none';
  document.getElementById('patternCanvas').style.display = mode === 'pattern'  ? 'block' : 'none';
  document.getElementById('patternUI').style.display     = mode === 'pattern'  ? 'flex' : 'none';
  document.getElementById('strategyUI').style.display    = mode === 'strategy' ? 'flex' : 'none';

  const hint = document.getElementById('hintText');
  hint.style.display = mode === 'strategy' ? 'none' : '';
  hint.innerHTML = mode === 'pattern'
    ? '선수 클릭-드래그: 이동 경로 설정 &nbsp;|&nbsp; 우클릭 화살표: 경로 삭제'
    : '드래그: 위치 이동 &nbsp;|&nbsp; 더블클릭: 이름 수정 &nbsp;|&nbsp; 우클릭/롱프레스: 색상·삭제';

  if (mode === 'pattern') {
    stopAnimation();
    updatePatternUI();
    renderPatternFrame(0);
  } else if (mode === 'strategy') {
    refreshSquadSummary();
  }
}

// ═══════════════════════════════════════════════════════════════
// FORMATION HELPERS
// ═══════════════════════════════════════════════════════════════
function rowX(count, i) { return Math.round(20 + (i + 1) * 440 / (count + 1)); }

function defaultPositions(modeKey, formKey) {
  // Returns { id: {x,y} } based on roster order
  const rows = MODES_CONFIG[modeKey].formations[formKey];
  const coords = [{ x: 240, y: 622 }]; // GK
  rows.forEach(row => {
    for (let i = 0; i < row.count; i++)
      coords.push({ x: rowX(row.count, i), y: row.y });
  });
  const result = {};
  roster.forEach((r, i) => {
    if (coords[i]) result[r.id] = { ...coords[i] };
  });
  return result;
}

function defaultRoster(modeKey, formKey) {
  const rows = MODES_CONFIG[modeKey].formations[formKey];
  const list = [{ id: 1, name: 'GK', color: '#E53935' }];
  let id = 2;
  rows.forEach(row => {
    for (let i = 0; i < row.count; i++)
      list.push({ id: id++, name: `${row.pre}${i+1}`, color: '#1E88E5' });
  });
  return list;
}

// ═══════════════════════════════════════════════════════════════
// MODE CHANGE (인원수)
// ═══════════════════════════════════════════════════════════════
function buildModePills() {
  document.getElementById('modePills').innerHTML =
    Object.entries(MODES_CONFIG).map(([k, c]) =>
      `<button class="mode-pill${k===currentMode?' active':''}" onclick="onModeChange('${k}')">${c.label}</button>`
    ).join('');
}

function onModeChange(k) {
  if (k === currentMode) return;
  const hasNotes = Object.values(squads).some(sq =>
    sq.teamNote.trim() || Object.values(sq.playerNotes).some(n => n.trim())
  );
  if (hasNotes && !confirm('인원수를 변경하면 모든 스쿼드와 지침이 초기화됩니다. 계속하시겠습니까?')) return;

  currentMode = k;
  buildModePills();
  initAllSquads();
}

function initAllSquads() {
  // Build default roster from current mode's first formation
  const defaultForm = Object.keys(MODES_CONFIG[currentMode].formations)[0];
  roster = defaultRoster(currentMode, defaultForm);
  nextId = roster.length + 1;

  // Reset all squad data
  const formKeys = {
    basic:   Object.keys(MODES_CONFIG[currentMode].formations)[0],
    attack:  Object.keys(MODES_CONFIG[currentMode].formations)[Math.min(1, Object.keys(MODES_CONFIG[currentMode].formations).length-1)],
    defense: Object.keys(MODES_CONFIG[currentMode].formations)[Math.min(2, Object.keys(MODES_CONFIG[currentMode].formations).length-1)],
  };
  ['basic','attack','defense'].forEach(type => {
    squads[type].formation  = formKeys[type];
    squads[type].positions  = defaultPositions(currentMode, formKeys[type]);
    squads[type].teamNote   = '';
    squads[type].playerNotes = {};
  });

  // 인원수가 바뀌면 명단이 재구성되므로 패턴도 초기화
  patterns = [{ name: '패턴 1', moves: {} }];
  currentPatternIdx = 0;

  refreshUI();
  autoSave();
}

// ═══════════════════════════════════════════════════════════════
// SQUAD SWITCHING
// ═══════════════════════════════════════════════════════════════
function saveCurrentNotes() {
  squads[currentSquad].teamNote = document.getElementById('teamNote').value;
  const players = getPlayers();
  players.forEach(p => {
    const el = document.getElementById('pnote_' + p.id);
    if (el) squads[currentSquad].playerNotes[p.id] = el.value;
  });
}

// 현재 state(currentMode/currentSquad/roster/squads)를 화면 전체에 반영
function refreshUI() {
  buildModePills();
  buildFormationSelect();
  document.getElementById('formationSelect').value = squads[currentSquad].formation;

  // Squad tab highlight + aria-selected
  document.querySelectorAll('.squad-tab').forEach(t => {
    const isActive = t.dataset.squad === currentSquad;
    t.classList.toggle('active', isActive);
    t.setAttribute('aria-selected', isActive ? 'true' : 'false');
  });

  // Badge + note label
  const meta = SQUAD_META[currentSquad];
  const badge = document.getElementById('squadBadge');
  badge.textContent = `${meta.icon} ${meta.label.replace(' 스쿼드','')}`;
  badge.className = `squad-badge ${currentSquad}`;
  document.getElementById('teamNoteLabel').textContent =
    `${meta.icon} ${meta.label} — 전체 지침`;

  renderPlayers();
  renderNotesPanel();
  updateAddPlayerBtn();

  if (appMode === 'pattern') { updatePatternUI(); renderPatternFrame(0); }
  else if (appMode === 'strategy') { refreshSquadSummary(); }
}

function switchSquad(type) {
  if (type === currentSquad) return;
  saveCurrentNotes();
  currentSquad = type;
  refreshUI();
}

// ═══════════════════════════════════════════════════════════════
// FORMATION SELECT
// ═══════════════════════════════════════════════════════════════
function buildFormationSelect() {
  document.getElementById('formationSelect').innerHTML =
    Object.keys(MODES_CONFIG[currentMode].formations)
      .map(f => `<option value="${f}">${f}</option>`).join('');
}

// 역할 접두어는 MODES_CONFIG에서 파생 (포메이션 추가 시 자동 반영)
const DEFAULT_NAME_RE = (() => {
  const prefixes = new Set(['GK', '선수']);
  Object.values(MODES_CONFIG).forEach(mode =>
    Object.values(mode.formations).forEach(rows =>
      rows.forEach(row => prefixes.add(row.pre))));
  // 긴 접두어 우선 매칭 ('수비형MF'가 '수비'보다 먼저)
  const alt = [...prefixes].sort((a, b) => b.length - a.length).join('|');
  return new RegExp(`^(${alt})\\d*$`);
})();

function hasDefaultNames() {
  return roster.every(r => DEFAULT_NAME_RE.test(r.name));
}

function reassignRosterNames(formKey) {
  const rows = MODES_CONFIG[currentMode].formations[formKey];
  const newNames = ['GK'];
  rows.forEach(row => {
    for (let i = 0; i < row.count; i++) newNames.push(`${row.pre}${i + 1}`);
  });
  roster.forEach((r, i) => { if (newNames[i]) r.name = newNames[i]; });
}

function onFormationChange() {
  const form = document.getElementById('formationSelect').value;
  squads[currentSquad].formation = form;
  squads[currentSquad].positions = defaultPositions(currentMode, form);

  if (hasDefaultNames() && confirm('포메이션이 변경되었습니다.\n선수 역할 라벨(수비1, 미드1 등)을 새 포메이션에 맞게 자동 재할당할까요?')) {
    reassignRosterNames(form);
    renderNotesPanel();
  }
  renderPlayers();
  autoSave();
}

function resetLayout() {
  squads[currentSquad].positions = defaultPositions(currentMode, squads[currentSquad].formation);
  renderPlayers();
  autoSave();
}

function updateAddPlayerBtn() {
  const btn = document.getElementById('addPlayerBtn');
  if (!btn) return;
  const max = MODES_CONFIG[currentMode].max;
  const atMax = roster.length >= max;
  btn.disabled = atMax;
  btn.title = atMax ? `${MODES_CONFIG[currentMode].label} 모드는 최대 ${max}명입니다` : '';
}

function addPlayer() {
  const max = MODES_CONFIG[currentMode].max;
  if (roster.length >= max) return;
  const newP = { id: nextId++, name: `선수${roster.length+1}`, color: '#1E88E5' };
  roster.push(newP);
  ['basic','attack','defense'].forEach(type => {
    squads[type].positions[newP.id] = { x: 240, y: 330 };
  });
  renderPlayers();
  renderNotesPanel();
  updateAddPlayerBtn();
  showToast(`선수${roster.length} 추가됨`);
  autoSave();
}

function showToast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.className = 'toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.classList.add('visible');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => { t.classList.remove('visible'); }, 1800);
}

// ═══════════════════════════════════════════════════════════════
// PLAYER RENDERING
// ═══════════════════════════════════════════════════════════════
function renderPlayers() {
  const f = document.getElementById('field');
  f.querySelectorAll('.player').forEach(e => e.remove());
  getPlayers().forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'player';
    el.dataset.id = p.id;
    el.style.left = p.x + 'px';
    el.style.top  = p.y + 'px';
    el.innerHTML = `
      <div class="player-circle" style="background:${p.color};">${i+1}</div>
      <div class="player-name">${escHtml(p.name)}</div>`;
    el.addEventListener('dblclick', e => { e.stopPropagation(); startInlineEdit(el, p); });
    el.addEventListener('contextmenu', e => { e.preventDefault(); e.stopPropagation(); showCtxMenu(e.clientX, e.clientY, p); });
    f.appendChild(el);
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// 복원된 외부 데이터(공유 URL·.sq 파일)도 UI 입력과 동일한 제약을 따르도록 정규화
function sanitizeRoster(list) {
  return (list || []).map(r => ({
    id: Number(r.id),
    name: String(r.name ?? '').slice(0, 12),
    color: String(r.color ?? '#1E88E5'),
  }));
}

function startInlineEdit(playerEl, player) {
  const nameEl = playerEl.querySelector('.player-name');
  const original = player.name;
  const input = document.createElement('input');
  input.type = 'text'; input.value = original; input.maxLength = 12;
  input.style.cssText = `width:64px;font-size:0.65rem;font-weight:600;text-align:center;
    background:rgba(0,0,0,0.7);color:white;border:1px solid #60a5fa;border-radius:4px;
    padding:1px 4px;outline:none;margin-top:3px;font-family:inherit;`;
  nameEl.replaceWith(input);
  input.select(); input.focus();
  const commit = () => {
    const newName = input.value.trim().slice(0,12) || original;
    // Sync name across all roster entries (shared)
    const r = roster.find(r => r.id === player.id);
    if (r) r.name = newName;
    renderPlayers();
    renderNotesPanel();
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key==='Enter') { e.preventDefault(); input.blur(); }
    if (e.key==='Escape') { input.value=original; input.blur(); }
    e.stopPropagation();
  });
  input.addEventListener('mousedown', e => e.stopPropagation());
}

// ═══════════════════════════════════════════════════════════════
// DRAG
// ═══════════════════════════════════════════════════════════════
const fieldEl = document.getElementById('field');

fieldEl.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  const pe = e.target.closest('.player');
  if (!pe) return;
  const id = Number(pe.dataset.id);
  const p = getPlayers().find(p => p.id === id);
  if (!p) return;
  hideCtxMenu();
  dragState = { id, el: pe, sx: e.clientX, sy: e.clientY, px: p.x, py: p.y };
  pe.classList.add('dragging');
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!dragState) return;
  const x = Math.max(26, Math.min(FIELD_W-26, dragState.px + e.clientX - dragState.sx));
  const y = Math.max(26, Math.min(FIELD_H-26, dragState.py + e.clientY - dragState.sy));
  squads[currentSquad].positions[dragState.id] = { x, y };
  dragState.el.style.left = x+'px';
  dragState.el.style.top  = y+'px';
});
document.addEventListener('mouseup', () => {
  if (dragState) { dragState.el.classList.remove('dragging'); dragState = null; autoSave(); }
});

fieldEl.addEventListener('touchstart', e => {
  const pe = e.target.closest('.player');
  if (!pe) return;
  const id = Number(pe.dataset.id);
  const p = getPlayers().find(p => p.id === id);
  if (!p) return;
  const t = e.touches[0];
  dragState = { id, el: pe, sx: t.clientX, sy: t.clientY, px: p.x, py: p.y };
  pe.classList.add('dragging'); e.preventDefault();
}, { passive: false });
document.addEventListener('touchmove', e => {
  if (!dragState) return;
  const t = e.touches[0];
  const x = Math.max(26, Math.min(FIELD_W-26, dragState.px + t.clientX - dragState.sx));
  const y = Math.max(26, Math.min(FIELD_H-26, dragState.py + t.clientY - dragState.sy));
  squads[currentSquad].positions[dragState.id] = { x, y };
  dragState.el.style.left = x+'px';
  dragState.el.style.top  = y+'px';
  e.preventDefault();
}, { passive: false });
document.addEventListener('touchend', () => {
  if (dragState) { dragState.el.classList.remove('dragging'); dragState = null; autoSave(); }
});

// ═══════════════════════════════════════════════════════════════
// CONTEXT MENU
// ═══════════════════════════════════════════════════════════════
function showCtxMenu(x, y, player) {
  selectedPlayer = player;
  document.getElementById('colorPalette').innerHTML = COLORS.map(c =>
    `<div class="swatch${c===player.color?' active':''}"
         style="background:${c};${c==='#ffffff'?'border-color:#475569;':''}"
         onclick="ctxColor('${c}')"></div>`
  ).join('');
  const m = document.getElementById('ctxMenu');
  m.style.left = Math.min(x, innerWidth-180)+'px';
  m.style.top  = Math.min(y, innerHeight-180)+'px';
  m.classList.add('visible');
}
function hideCtxMenu() { document.getElementById('ctxMenu').classList.remove('visible'); }
document.addEventListener('click', e => { if (!e.target.closest('#ctxMenu')) hideCtxMenu(); });
document.addEventListener('contextmenu', e => { if (!e.target.closest('.player')) hideCtxMenu(); });

function ctxColor(c) {
  if (!selectedPlayer) return;
  // Sync color across roster (shared)
  const r = roster.find(r => r.id === selectedPlayer.id);
  if (r) r.color = c;
  renderPlayers(); renderNotesPanel(); hideCtxMenu();
}
function ctxRename() {
  if (!selectedPlayer) return;
  const n = prompt('선수 이름:', selectedPlayer.name);
  if (n !== null) {
    const r = roster.find(r => r.id === selectedPlayer.id);
    if (r) r.name = n.trim().slice(0,12) || selectedPlayer.name;
    renderPlayers(); renderNotesPanel();
  }
  hideCtxMenu();
}
function ctxRemove() {
  if (!selectedPlayer) return;
  if (roster.length <= 1) { alert('선수가 1명 이하면 삭제할 수 없습니다.'); return; }
  const id = selectedPlayer.id;
  roster = roster.filter(r => r.id !== id);
  ['basic','attack','defense'].forEach(type => {
    delete squads[type].positions[id];
    delete squads[type].playerNotes[id];
  });
  patterns.forEach(pt => { delete pt.moves[id]; });
  renderPlayers(); renderNotesPanel(); hideCtxMenu();
}

// ═══════════════════════════════════════════════════════════════
// SAVE IMAGE
// ═══════════════════════════════════════════════════════════════
function saveImage() {
  const teamName = document.getElementById('teamName').value.trim();
  const form     = squads[currentSquad].formation;
  const meta     = SQUAD_META[currentSquad];
  const f        = document.getElementById('field');
  const label    = `${teamName ? teamName + ' ' : ''}${meta.icon} ${meta.label} [${form}]`;
  const banner   = document.createElement('div');
  banner.style.cssText = `position:absolute;top:28px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,0.55);color:white;font-weight:700;font-size:14px;
    padding:5px 18px;border-radius:20px;z-index:200;white-space:nowrap;pointer-events:none;`;
  banner.textContent = label;
  f.appendChild(banner);
  html2canvas(f, { scale:2.5, backgroundColor:'#276d41', useCORS:true, logging:false })
    .then(canvas => {
      f.removeChild(banner);
      const a = document.createElement('a');
      a.download = `${teamName||'스쿼드'}_${meta.label}_${form}.png`;
      a.href = canvas.toDataURL('image/png'); a.click();
    }).catch(() => { if (banner.parentNode) f.removeChild(banner); });
}

// ═══════════════════════════════════════════════════════════════
// ATTACK PATTERNS — 관리
// ═══════════════════════════════════════════════════════════════
function currentPattern() { return patterns[currentPatternIdx]; }

function updatePatternUI() {
  document.getElementById('patternName').value = currentPattern().name;
  document.getElementById('patternCounter').textContent = `${currentPatternIdx+1} / ${patterns.length}`;
}

function addPattern() {
  patterns.push({ name: `패턴 ${patterns.length+1}`, moves: {} });
  currentPatternIdx = patterns.length - 1;
  stopAnimation(); updatePatternUI(); renderPatternFrame(0); autoSave();
}

function deletePattern() {
  if (patterns.length === 1) { showToast('패턴이 1개이면 삭제할 수 없습니다.'); return; }
  patterns.splice(currentPatternIdx, 1);
  currentPatternIdx = Math.min(currentPatternIdx, patterns.length-1);
  stopAnimation(); updatePatternUI(); renderPatternFrame(0); autoSave();
}

function prevPattern() {
  currentPatternIdx = (currentPatternIdx - 1 + patterns.length) % patterns.length;
  stopAnimation(); updatePatternUI(); renderPatternFrame(0);
}

function nextPattern() {
  currentPatternIdx = (currentPatternIdx + 1) % patterns.length;
  stopAnimation(); updatePatternUI(); renderPatternFrame(0);
}

function renameCurrentPattern() {
  const v = document.getElementById('patternName').value.trim().slice(0, 20);
  if (v) currentPattern().name = v;
  updatePatternUI(); autoSave();
}

function clearCurrentPattern() {
  currentPattern().moves = {};
  stopAnimation(); renderPatternFrame(0); autoSave();
}

// ═══════════════════════════════════════════════════════════════
// ATTACK PATTERNS — 캔버스 렌더링
// ═══════════════════════════════════════════════════════════════
const pCanvas = document.getElementById('patternCanvas');
const pCtx = pCanvas.getContext('2d');

function canvasField(ctx) {
  ctx.fillStyle = '#276d41'; ctx.fillRect(0, 0, FIELD_W, FIELD_H);
  for (let y = 44; y < FIELD_H; y += 88) {
    ctx.fillStyle = 'rgba(0,0,0,0.07)'; ctx.fillRect(0, y, FIELD_W, 44);
  }
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 2;
  const L=(x,y,w,h)=>ctx.fillRect(x,y,w,h);
  const C=(cx,cy,r)=>{ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();};
  const D=(cx,cy,r)=>{ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();};
  L(20,20,440,2);L(20,638,440,2);L(20,20,2,620);L(458,20,2,620);
  L(20,330,440,2);C(240,330,60);D(240,330,4);
  L(130,558,220,2);L(130,558,2,82);L(348,558,2,82);
  L(184,598,112,2);L(184,598,2,42);L(294,598,2,42);D(240,530,3);
  L(194,638,92,8);L(194,638,2,10);L(284,638,2,10);
  L(130,100,220,2);L(130,20,2,82);L(348,20,2,82);
  L(184,60,112,2);L(184,20,2,42);L(294,20,2,42);D(240,128,3);
  L(194,12,92,8);L(194,12,2,10);L(284,12,2,10);
}

function canvasPlayer(ctx, color, name, num, x, y) {
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.55)';
  ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(x, y, PLAYER_R, 0, Math.PI*2);
  ctx.fillStyle = color; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'white';
  ctx.font = 'bold 13px Segoe UI, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(String(num), x, y);
  ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 5;
  ctx.font = 'bold 10px Segoe UI, sans-serif';
  ctx.fillText(name.slice(0, 7), x, y + 32);
  ctx.restore();
}

function canvasArrow(ctx, fx, fy, tx, ty, color, alpha) {
  const angle = Math.atan2(ty-fy, tx-fx);
  const len = Math.hypot(tx-fx, ty-fy);
  if (len < 10) return;
  const sx = fx + PLAYER_R * Math.cos(angle);
  const sy = fy + PLAYER_R * Math.sin(angle);
  const ex = tx - 13 * Math.cos(angle);
  const ey = ty - 13 * Math.sin(angle);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color; ctx.lineWidth = 3;
  ctx.setLineDash([10, 5]);
  ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(tx, ty);
  ctx.lineTo(tx - 16*Math.cos(angle-Math.PI/6), ty - 16*Math.sin(angle-Math.PI/6));
  ctx.lineTo(tx - 16*Math.cos(angle+Math.PI/6), ty - 16*Math.sin(angle+Math.PI/6));
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

function renderPatternFrame(t, patIdx) {
  const pIdx = (patIdx !== undefined) ? patIdx : currentPatternIdx;
  const pat = patterns[pIdx];
  const players = getPlayers();
  canvasField(pCtx);

  const arrowAlpha = Math.max(0, 1 - t * 2);
  const et = easeInOut(Math.min(t, 1));

  if (pat) {
    Object.entries(pat.moves).forEach(([id, move]) => {
      const p = players.find(p => p.id == id);
      if (!p) return;
      canvasArrow(pCtx, p.x, p.y, move.toX, move.toY, '#facc15', arrowAlpha);
    });
    if (drawState) {
      canvasArrow(pCtx, drawState.fromX, drawState.fromY, drawState.curX, drawState.curY, '#facc15', 0.7);
    }
  }

  players.forEach((p, i) => {
    const move = pat?.moves[p.id];
    const x = move ? p.x + (move.toX - p.x) * et : p.x;
    const y = move ? p.y + (move.toY - p.y) * et : p.y;
    canvasPlayer(pCtx, p.color, p.name, i+1, x, y);
  });
}

// ═══════════════════════════════════════════════════════════════
// ATTACK PATTERNS — 경로 드로잉 인터랙션
// ═══════════════════════════════════════════════════════════════
function hitPlayer(x, y) {
  return getPlayers().find(p => Math.hypot(x - p.x, y - p.y) <= PLAYER_R + 4);
}

function hitArrow(x, y) {
  const pat = currentPattern();
  const players = getPlayers();
  for (const [id, move] of Object.entries(pat.moves)) {
    const p = players.find(p => p.id == id);
    if (!p) continue;
    const mx = (p.x + move.toX) / 2;
    const my = (p.y + move.toY) / 2;
    if (Math.hypot(x - mx, y - my) < 16) return Number(id);
    if (Math.hypot(x - move.toX, y - move.toY) < 16) return Number(id);
  }
  return null;
}

function canvasCoords(e) {
  const rect = pCanvas.getBoundingClientRect();
  const scaleX = FIELD_W / rect.width;
  const scaleY = FIELD_H / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - rect.left) * scaleX, y: (src.clientY - rect.top) * scaleY };
}

pCanvas.addEventListener('mousedown', e => {
  if (e.button === 2) return; // 우클릭은 contextmenu에서 처리
  const { x, y } = canvasCoords(e);
  const p = hitPlayer(x, y);
  if (p) {
    stopAnimation();
    drawState = { playerId: p.id, fromX: p.x, fromY: p.y, curX: x, curY: y };
    e.preventDefault();
  }
});

pCanvas.addEventListener('mousemove', e => {
  if (!drawState) return;
  const { x, y } = canvasCoords(e);
  drawState.curX = Math.max(5, Math.min(FIELD_W-5, x));
  drawState.curY = Math.max(5, Math.min(FIELD_H-5, y));
  renderPatternFrame(0);
});

pCanvas.addEventListener('mouseup', e => {
  if (!drawState) return;
  const { x, y } = canvasCoords(e);
  const dist = Math.hypot(x - drawState.fromX, y - drawState.fromY);
  if (dist > 15) {
    currentPattern().moves[drawState.playerId] = {
      toX: Math.max(5, Math.min(FIELD_W-5, x)),
      toY: Math.max(5, Math.min(FIELD_H-5, y)),
    };
    autoSave();
  }
  drawState = null;
  renderPatternFrame(0);
});

pCanvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  const { x, y } = canvasCoords(e);
  const id = hitArrow(x, y);
  if (id !== null) {
    delete currentPattern().moves[id];
    renderPatternFrame(0);
    autoSave();
  }
});

pCanvas.addEventListener('touchstart', e => {
  const { x, y } = canvasCoords(e);
  const p = hitPlayer(x, y);
  if (p) {
    stopAnimation();
    drawState = { playerId: p.id, fromX: p.x, fromY: p.y, curX: x, curY: y };
    e.preventDefault();
  }
}, { passive: false });

pCanvas.addEventListener('touchmove', e => {
  if (!drawState) return;
  const { x, y } = canvasCoords(e);
  drawState.curX = Math.max(5, Math.min(FIELD_W-5, x));
  drawState.curY = Math.max(5, Math.min(FIELD_H-5, y));
  renderPatternFrame(0);
  e.preventDefault();
}, { passive: false });

pCanvas.addEventListener('touchend', e => {
  if (!drawState) return;
  const { x, y } = canvasCoords({ touches: e.changedTouches });
  const dist = Math.hypot(x - drawState.fromX, y - drawState.fromY);
  if (dist > 15) {
    currentPattern().moves[drawState.playerId] = {
      toX: Math.max(5, Math.min(FIELD_W-5, x)),
      toY: Math.max(5, Math.min(FIELD_H-5, y)),
    };
    autoSave();
  }
  drawState = null;
  renderPatternFrame(0);
});

// ═══════════════════════════════════════════════════════════════
// ATTACK PATTERNS — 애니메이션
// ═══════════════════════════════════════════════════════════════
function togglePlay() {
  isPlaying ? stopAnimation() : startAnimation();
}

function startAnimation() {
  isPlaying = true;
  animStart = null;
  document.getElementById('playBtn').textContent = '⏸ 일시정지';
  animRaf = requestAnimationFrame(animTick);
}

function stopAnimation() {
  if (animRaf) { cancelAnimationFrame(animRaf); animRaf = null; }
  isPlaying = false;
  document.getElementById('playBtn').textContent = '▶ 미리보기';
  if (appMode === 'pattern') renderPatternFrame(0);
}

function animTick(ts) {
  if (!animStart) animStart = ts;
  const t = (ts - animStart) / ANIM_MS;
  renderPatternFrame(Math.min(t, 1));
  if (t < 1) {
    animRaf = requestAnimationFrame(animTick);
  } else {
    // 끝 상태 1초 유지 후 루프
    setTimeout(() => {
      if (isPlaying) {
        animStart = null;
        animRaf = requestAnimationFrame(animTick);
      }
    }, 1000);
  }
}

// ═══════════════════════════════════════════════════════════════
// ATTACK PATTERNS — GIF 내보내기
// ═══════════════════════════════════════════════════════════════
async function exportGif(allPatterns) {
  stopAnimation();
  const players = getPlayers();
  const patsToExport = allPatterns ? patterns : [currentPattern()];
  const filename = allPatterns ? '전체패턴' : (currentPattern().name || '공격패턴');

  const prog = document.getElementById('gifProgress');
  prog.classList.add('visible');
  setProgress(0, 'GIF 생성 준비 중...');

  // 워커 스크립트를 blob으로 가져와 CORS 문제 회피
  let workerUrl;
  try {
    const resp = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
    const text = await resp.text();
    workerUrl = URL.createObjectURL(new Blob([text], { type: 'application/javascript' }));
  } catch {
    workerUrl = 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js';
  }

  const gif = new GIF({
    workers: 2,
    quality: 8,
    width: FIELD_W,
    height: FIELD_H,
    workerScript: workerUrl,
  });

  const off = document.createElement('canvas');
  off.width = FIELD_W; off.height = FIELD_H;
  const offCtx = off.getContext('2d');

  const FRAMES = 36;
  const HOLD_FRAMES = 10;
  const FRAME_DELAY = 55;   // ms/frame ≈ 18fps
  const HOLD_DELAY = 120;

  const totalFrames = patsToExport.length * (FRAMES + HOLD_FRAMES);
  let doneFrames = 0;

  function renderOffscreen(t, patIdx) {
    canvasField(offCtx);
    const pat = patsToExport[patIdx];
    const et = easeInOut(Math.min(t, 1));
    const arrowAlpha = Math.max(0, 1 - t * 2);

    if (pat) {
      Object.entries(pat.moves).forEach(([id, move]) => {
        const p = players.find(p => p.id == id);
        if (!p) return;
        canvasArrow(offCtx, p.x, p.y, move.toX, move.toY, '#facc15', arrowAlpha);
      });
    }
    players.forEach((p, i) => {
      const move = pat?.moves[p.id];
      const x = move ? p.x + (move.toX - p.x) * et : p.x;
      const y = move ? p.y + (move.toY - p.y) * et : p.y;
      canvasPlayer(offCtx, p.color, p.name, i+1, x, y);
    });

    if (allPatterns && pat) {
      offCtx.save();
      offCtx.fillStyle = 'rgba(0,0,0,0.5)';
      offCtx.beginPath();
      offCtx.roundRect(10, 10, 140, 28, 6);
      offCtx.fill();
      offCtx.fillStyle = 'white';
      offCtx.font = 'bold 13px Segoe UI, sans-serif';
      offCtx.textAlign = 'left';
      offCtx.textBaseline = 'middle';
      offCtx.fillText(pat.name, 18, 24);
      offCtx.restore();
    }
  }

  for (let pi = 0; pi < patsToExport.length; pi++) {
    for (let f = 0; f <= FRAMES; f++) {
      renderOffscreen(f / FRAMES, pi);
      gif.addFrame(offCtx, { delay: FRAME_DELAY, copy: true });
      doneFrames++;
      setProgress(doneFrames / totalFrames * 0.7, `패턴 ${pi+1}/${patsToExport.length} 렌더링 중...`);
      await new Promise(r => setTimeout(r, 0)); // 브라우저에 양보
    }
    for (let f = 0; f < HOLD_FRAMES; f++) {
      renderOffscreen(1, pi);
      gif.addFrame(offCtx, { delay: HOLD_DELAY, copy: true });
      doneFrames++;
    }
  }

  gif.on('progress', p => setProgress(0.7 + p * 0.3, `GIF 인코딩 중... ${Math.round(p*100)}%`));
  gif.on('finished', blob => {
    const a = document.createElement('a');
    a.download = `${filename}.gif`;
    a.href = URL.createObjectURL(blob);
    a.click();
    prog.classList.remove('visible');
    renderPatternFrame(0);
    if (workerUrl.startsWith('blob:')) URL.revokeObjectURL(workerUrl);
  });

  gif.render();
}

function setProgress(ratio, text) {
  document.getElementById('gifProgressText').textContent = text;
  document.getElementById('gifProgressFill').style.width = Math.round(ratio * 100) + '%';
}

function classifyPlayer(p) {
  if (p.y >= 590) return 'GK';
  if (p.y >= 450) return '수비';
  if (p.y >= 300) return '미드필더';
  return '공격';
}

function refreshSquadSummary() {
  const players = getPlayers();
  const formation = squads[currentSquad].formation;
  const modeLabel = MODES_CONFIG[currentMode].label;
  const meta = SQUAD_META[currentSquad];
  const el = document.getElementById('squadSummary');

  const roleCounts = { GK: 0, 수비: 0, 미드필더: 0, 공격: 0 };
  players.forEach(p => roleCounts[classifyPlayer(p)]++);

  const activePats = patterns.filter(pt => Object.keys(pt.moves).length > 0);

  el.innerHTML = `
    <div style="margin-bottom:8px;">
      <span class="formation-badge">${meta.icon} ${escHtml(meta.label)} · ${modeLabel} / ${escHtml(formation)}</span>
    </div>
    <div style="font-size:0.75rem;color:#64748b;margin-bottom:6px;">
      GK ${roleCounts.GK} &nbsp;|&nbsp; 수비 ${roleCounts.수비} &nbsp;|&nbsp; 미드 ${roleCounts.미드필더} &nbsp;|&nbsp; 공격 ${roleCounts.공격}
      &nbsp;&nbsp;·&nbsp;&nbsp; 공격패턴 ${activePats.length}개
    </div>
    <div class="player-list">
      ${players.map((p,i) => `
        <div class="player-chip">
          <div class="dot" style="background:${p.color};"></div>
          <span>${i+1}. ${escHtml(p.name)}</span>
        </div>`).join('')}
    </div>
    ${activePats.length > 0 ? `<div class="pattern-chips">
      ${activePats.map(pt=>`<span class="pattern-chip">🎯 ${escHtml(pt.name)}</span>`).join('')}
    </div>` : ''}
  `;
}

// ═══════════════════════════════════════════════════════════════
// MATCH STRATEGY — 전술 지침서 생성 (규칙 기반)
// ═══════════════════════════════════════════════════════════════
let lastManualText = '';

function generateManual() {
  const players   = getPlayers();
  const opponent  = document.getElementById('opponent').value.trim() || '상대팀';
  const matchDate = document.getElementById('matchDate').value;
  const notes     = document.getElementById('matchNotes').value.trim();
  const formation = squads[currentSquad].formation;
  const modeLabel = MODES_CONFIG[currentMode].label;

  // ── 포메이션 기반 전술 성향 ──────────────────────────────────
  const roleCounts = { GK: 0, 수비: 0, 미드필더: 0, 공격: 0 };
  players.forEach(p => roleCounts[classifyPlayer(p)]++);

  const defRatio = roleCounts.수비 / (players.length - 1 || 1);
  let tacticalStyle, pressLine, defLine, transitionMsg;
  if (defRatio >= 0.45) {
    tacticalStyle = '수비 우선 / 역습';
    pressLine     = '하프라인 뒤로 물러나 수비 블록을 형성한다.';
    defLine       = '수비 라인은 컴팩트하게 유지하고, 상대 공격수 침투 공간을 최소화한다.';
    transitionMsg = '공 탈취 후 빠른 전환으로 역습 찬스를 노린다. 전방 공격수로 즉시 연결한다.';
  } else if (defRatio <= 0.28) {
    tacticalStyle = '공격적 / 전방 압박';
    pressLine     = '상대 빌드업 시 전방부터 압박하여 실수를 유도한다.';
    defLine       = '수비 라인은 높게 유지하여 미드필더와 간격을 좁힌다. 오프사이드 트랩을 적극 활용한다.';
    transitionMsg = '공 소유 시 빠른 패스 전개로 상대 수비 재조직 전에 공격한다.';
  } else {
    tacticalStyle = '밸런스 / 점유 기반';
    pressLine     = '미드필드에서 수비 블록을 형성하고, 공 소유 시 빌드업 플레이를 진행한다.';
    defLine       = '수비 라인과 미드필더 간격을 30m 이내로 유지한다.';
    transitionMsg = '공 탈취 후 무리한 전진보다 안전한 패스로 점유를 유지한다.';
  }

  // ── 패턴 분석 ────────────────────────────────────────────────
  const activePats = patterns.filter(pt => Object.keys(pt.moves).length > 0);

  const playerMoves = {}; // id → [{patName, dx, dy}]
  activePats.forEach(pt => {
    Object.entries(pt.moves).forEach(([id, move]) => {
      const p = players.find(p => p.id == id);
      if (!p) return;
      if (!playerMoves[id]) playerMoves[id] = [];
      playerMoves[id].push({ patName: pt.name, dx: move.toX - p.x, dy: move.toY - p.y });
    });
  });

  function moveDir(dx, dy) {
    if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return '제자리 유지';
    if (dx > 40 && dy < -40)  return '우측 전방 침투';
    if (dx < -40 && dy < -40) return '좌측 전방 침투';
    if (dy < -40) return '전방 침투';
    if (dy > 40)  return '후방 지원';
    if (dx > 40)  return '우측 오버랩';
    if (dx < -40) return '좌측 오버랩';
    return '사선 이동';
  }

  function describeMoves(id) {
    const mvs = playerMoves[id];
    if (!mvs || mvs.length === 0) return [];
    return mvs.map(m => `[${m.patName}] ${moveDir(m.dx, m.dy)} 이동`);
  }

  // ── 팀 전체 섹션 ─────────────────────────────────────────────
  const dateStr = matchDate
    ? new Date(matchDate).toLocaleString('ko-KR', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' })
    : '미정';

  const teamLines = [
    `상대: ${opponent} | 일시: ${dateStr}`,
    `포메이션: ${modeLabel} ${formation} (${tacticalStyle})`,
    `압박 전략: ${pressLine}`,
    `수비 원칙: ${defLine}`,
    `전환 원칙: ${transitionMsg}`,
  ];

  if (activePats.length > 0) {
    teamLines.push(`공격 패턴 ${activePats.length}가지(${activePats.map(p=>p.name).join(', ')})를 숙지한다.`);
    teamLines.push('세트피스 및 빠른 전환 상황에서 해당 패턴을 우선 시도한다.');
  }
  if (notes) {
    teamLines.push(`감독 지시: ${notes}`);
  }

  // ── 개별 선수 섹션 ───────────────────────────────────────────
  const roleInstructions = {
    GK: () => [
      '골 라인 수비 및 페널티 구역 제공권을 장악한다.',
      '수비진과 지속적으로 소통하여 위험 상황을 사전에 차단한다.',
      '점유 시 빌드업 첫 번째 패스 역할을 담당한다.',
    ],
    수비: (p) => {
      const isFlank = p.x < 160 || p.x > 320;
      return [
        '수비 라인 위치와 간격을 유지한다.',
        isFlank ? '측면 공간 커버 및 상대 윙어 대인 마크를 담당한다.' : '중앙 공간 차단 및 헤더 경합을 우선시한다.',
        '공 소유 시 안전한 옆패스 또는 GK에게 리셋한다.',
      ];
    },
    미드필더: (p) => {
      const isFlank = p.x < 160 || p.x > 320;
      return [
        isFlank ? '측면 공간을 활용한 드리블 돌파와 크로스를 시도한다.' : '중앙 연결 및 공 순환 역할을 담당한다.',
        '수비 시 빠른 압박으로 상대 전진을 차단한다.',
        '공격 시 공격수와의 원투패스 콤비네이션을 적극 활용한다.',
      ];
    },
    공격: (p) => {
      const isFlank = p.x < 160 || p.x > 320;
      return [
        isFlank ? '측면에서 상대 수비를 끌어낸 뒤 중앙으로 컷인 또는 크로스를 시도한다.' : '중앙에서 침투 움직임으로 상대 수비 라인을 압박한다.',
        '득점 기회에서 과감하게 슈팅한다.',
        '수비 전환 시 전방에서 압박의 첫 번째 역할을 수행한다.',
      ];
    },
  };

  const playerSections = players.map((p, i) => {
    const role = classifyPlayer(p);
    const baseLines = roleInstructions[role](p);
    return { player: p, num: i + 1, role, lines: [...baseLines, ...describeMoves(p.id)] };
  });

  // ── HTML 렌더링 ──────────────────────────────────────────────
  const card = document.getElementById('manualCard');
  const out  = document.getElementById('manualOutput');
  card.style.display = '';

  out.innerHTML = `
    <div class="tactic-section">
      <div class="tactic-section-title">📢 팀 전체 전달사항</div>
      ${teamLines.map(l => `<div class="tactic-line">${escHtml(l)}</div>`).join('')}
    </div>
    <div class="tactic-section">
      <div class="tactic-section-title">👤 개별 선수 지침</div>
      ${playerSections.map(s => `
        <div class="tactic-player-title">
          ${s.num}. ${escHtml(s.player.name)}
          <span class="tactic-tag ${s.role==='GK'?'red':s.role==='수비'?'green':s.role==='미드필더'?'':'amber'}">${s.role}</span>
        </div>
        ${s.lines.map(l => `<div class="tactic-line">${escHtml(l)}</div>`).join('')}
      `).join('')}
    </div>
  `;

  lastManualText = buildPlainText(opponent, dateStr, formation, modeLabel, tacticalStyle, teamLines, playerSections);

  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function buildPlainText(opponent, dateStr, formation, modeLabel, style, teamLines, playerSections) {
  const sep = '─'.repeat(40);
  let t = `⚽ 전술 지침서\n${sep}\n`;
  t += `상대: ${opponent}  |  일시: ${dateStr}\n포메이션: ${modeLabel} ${formation} (${style})\n${sep}\n`;
  t += `▶ 팀 전체 전달사항\n`;
  teamLines.forEach(l => t += `  • ${l}\n`);
  t += `\n▶ 개별 선수 지침\n`;
  playerSections.forEach(s => {
    t += `\n[${s.num}] ${s.player.name} (${s.role})\n`;
    s.lines.forEach(l => t += `  • ${l}\n`);
  });
  return t;
}

// SHARE TEXT GENERATION
// ═══════════════════════════════════════════════════════════════
function buildShareText() {
  saveCurrentNotes();

  const teamName = document.getElementById('teamName').value.trim() || '우리팀';
  const modeLabel = MODES_CONFIG[currentMode].label;
  const line = '─'.repeat(22);

  let t = `⚽ ${teamName} 전술 공유 (${modeLabel})\n${line}\n\n`;

  // 스쿼드별 명단
  ['basic','attack','defense'].forEach(type => {
    const sq   = squads[type];
    const meta = SQUAD_META[type];
    const players = roster.map((r, i) => {
      const pos = sq.positions[r.id];
      return { ...r, x: pos?.x ?? 240, y: pos?.y ?? 330, num: i+1 };
    });
    t += `${meta.icon} ${meta.label} [${sq.formation}]\n`;
    players.forEach(p => { t += `  ${numCircle(p.num)} ${p.name}\n`; });
    t += '\n';
  });

  // 스쿼드별 전체 지침
  const hasAnyTeamNote = ['basic','attack','defense'].some(type => squads[type].teamNote.trim());
  if (hasAnyTeamNote) {
    t += `${line}\n📢 스쿼드별 전체 지침\n`;
    ['basic','attack','defense'].forEach(type => {
      const note = squads[type].teamNote.trim();
      if (!note) return;
      const meta = SQUAD_META[type];
      t += `\n${meta.icon} ${meta.label}\n${note}\n`;
    });
    t += '\n';
  }

  // 개별 선수 지침 (전 스쿼드 통합)
  // 선수별로 스쿼드별 노트 합산
  const hasAnyPlayerNote = roster.some(r =>
    ['basic','attack','defense'].some(type => (squads[type].playerNotes[r.id] || '').trim())
  );
  if (hasAnyPlayerNote) {
    t += `${line}\n👤 개별 선수 지침\n`;
    roster.forEach((r, i) => {
      const notesBySquad = ['basic','attack','defense']
        .map(type => {
          const note = (squads[type].playerNotes[r.id] || '').trim();
          return note ? `  ${SQUAD_META[type].icon} ${note}` : null;
        }).filter(Boolean);
      if (notesBySquad.length === 0) return;
      t += `\n${numCircle(i+1)} ${r.name}\n${notesBySquad.join('\n')}\n`;
    });
  }

  return t.trim();
}

function numCircle(n) {
  const circles = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪'];
  return circles[n-1] || `${n}.`;
}

// ═══════════════════════════════════════════════════════════════
// URL STATE ENCODING / DECODING
// ═══════════════════════════════════════════════════════════════
function encodeState() {
  const snap = buildStateSnap();
  try {
    // URL-safe base64: replace +→- /→_ and strip padding =
    return btoa(unescape(encodeURIComponent(JSON.stringify(snap))))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  } catch { return ''; }
}

function decodeState(encoded) {
  try {
    // Restore URL-safe base64 to standard base64
    let b64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
    b64 += '=='.slice(0, (4 - b64.length % 4) % 4);
    return JSON.parse(decodeURIComponent(escape(atob(b64))));
  } catch { return null; }
}

function generateShareURL() {
  const enc = encodeState();
  if (!enc) return location.href;
  return `${location.origin}${location.pathname}#s=${enc}`;
}

function loadFromURL() {
  const match = location.hash.match(/[#&]s=([A-Za-z0-9\-_]+)/);
  if (!match || !match[1]) return false;
  const state = decodeState(match[1]);
  if (!state || state.v !== 1) return false;
  restoreState(state); // Data-only — INIT block handles UI refresh
  return true;
}

function copyShareUrl() {
  const url = generateShareURL();
  navigator.clipboard.writeText(url)
    .then(() => alert('링크가 복사되었습니다!\n공유받은 사람이 링크를 열면 동일한 스쿼드를 볼 수 있습니다.'))
    .catch(() => {
      const box = document.getElementById('shareUrlBox');
      box.focus();
      document.execCommand('selectAll');
      alert('자동 복사 실패 — 위 링크를 직접 선택해서 복사해주세요.');
    });
}

// ═══════════════════════════════════════════════════════════════
// FILE SAVE / LOAD (.sq)
// ═══════════════════════════════════════════════════════════════
function buildStateSnap() {
  saveCurrentNotes();
  const snap = {
    v: 1,
    team: document.getElementById('teamName').value.trim(),
    mode: currentMode,
    squad: currentSquad,
    roster: roster.map(r => ({ id: r.id, name: r.name, color: r.color })),
    squads: {},
  };
  ['basic','attack','defense'].forEach(type => {
    const sq = squads[type];
    const pos = {};
    Object.entries(sq.positions).forEach(([id, p]) => {
      pos[id] = { x: Math.round(p.x), y: Math.round(p.y) };
    });
    snap.squads[type] = { f: sq.formation, pos, tn: sq.teamNote, pn: sq.playerNotes };
  });
  snap.pat = patterns.map(pt => {
    const m = {};
    Object.entries(pt.moves).forEach(([id, mv]) => {
      m[id] = { x: Math.round(mv.toX), y: Math.round(mv.toY) };
    });
    return { n: pt.name, m };
  });
  return snap;
}

function saveSquadFile() {
  const snap = buildStateSnap();
  const json = JSON.stringify(snap, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const teamName = snap.team || '스쿼드';
  a.href     = url;
  a.download = `${teamName}.sq`;
  a.click();
  URL.revokeObjectURL(url);
}

function loadSquadFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const state = JSON.parse(e.target.result);
      if (!state || state.v !== 1) { alert('올바른 .sq 파일이 아닙니다.'); return; }
      applyState(state);
    } catch {
      alert('파일을 읽는 중 오류가 발생했습니다.');
    }
    // 같은 파일을 다시 불러올 수 있도록 값 초기화
    event.target.value = '';
  };
  reader.readAsText(file);
}

// 외부 데이터(공유 URL·.sq 파일·localStorage)를 state에 복원 (데이터만, UI 미갱신)
// 잘못된 mode/formation/squad 값은 기본값으로 대체해 초기화 중단을 막는다
function restoreState(state) {
  document.getElementById('teamName').value = state.team || '';
  currentMode = MODES_CONFIG[state.mode] ? state.mode : '9v9';
  roster = sanitizeRoster(state.roster);
  nextId = roster.length ? Math.max(...roster.map(r => r.id)) + 1 : 1;
  const formations = MODES_CONFIG[currentMode].formations;
  ['basic','attack','defense'].forEach(type => {
    const sq = state.squads?.[type];
    if (!sq) return;
    squads[type].formation   = formations[sq.f] ? sq.f : Object.keys(formations)[0];
    squads[type].positions   = sq.pos || {};
    squads[type].teamNote    = sq.tn  || '';
    squads[type].playerNotes = sq.pn  || {};
  });
  currentSquad = SQUAD_META[state.squad] ? state.squad : 'basic';
  patterns = sanitizePatterns(state.pat);
  currentPatternIdx = 0;
}

// 복원된 패턴 데이터 정규화 — 이름 길이 제한, 좌표는 숫자·필드 범위로 강제
function sanitizePatterns(list) {
  const pats = (Array.isArray(list) ? list : []).map(pt => {
    const moves = {};
    Object.entries(pt?.m || {}).forEach(([id, mv]) => {
      const toX = Number(mv?.x), toY = Number(mv?.y);
      if (Number.isFinite(toX) && Number.isFinite(toY)) {
        moves[id] = {
          toX: Math.max(5, Math.min(FIELD_W-5, toX)),
          toY: Math.max(5, Math.min(FIELD_H-5, toY)),
        };
      }
    });
    return { name: String(pt?.n ?? '패턴').slice(0, 20), moves };
  });
  return pats.length ? pats : [{ name: '패턴 1', moves: {} }];
}

function applyState(state) {
  restoreState(state);
  refreshUI();
}

// ═══════════════════════════════════════════════════════════════
// PLAYER VIEW
// ═══════════════════════════════════════════════════════════════
const MINI_W = 140, MINI_H = 192;
const MINI_SCALE = MINI_W / FIELD_W;

function describeZone(x, y) {
  const hz = x < FIELD_W * 0.35 ? '좌측' : x > FIELD_W * 0.65 ? '우측' : '중앙';
  if (y >= 590) return 'GK';
  if (y >= 450) return `수비 라인 ${hz}`;
  if (y >= 300) return `미드필드 ${hz}`;
  return `공격 라인 ${hz}`;
}

function openPlayerView(playerId) {
  const modal = document.getElementById('playerViewModal');
  const sel = document.getElementById('pvSelector');
  sel.innerHTML = '';
  roster.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r.id;
    opt.textContent = r.name || '(이름 없음)';
    if (r.id === playerId) opt.selected = true;
    sel.appendChild(opt);
  });
  if (!playerId && roster.length > 0) playerId = roster[0].id;
  modal.style.display = 'flex';
  renderPlayerView(playerId);
}

function closePlayerView() {
  document.getElementById('playerViewModal').style.display = 'none';
}

function onPvSelect() {
  const id = parseInt(document.getElementById('pvSelector').value);
  renderPlayerView(id);
}

function ctxPlayerView() {
  hideCtxMenu();
  openPlayerView(selectedPlayer ? selectedPlayer.id : null);
}

function renderPlayerView(playerId) {
  const player = roster.find(r => r.id === playerId);
  if (!player) return;

  // header avatar
  const avatar = document.getElementById('pvAvatar');
  avatar.style.background = player.color || '#4fc3f7';
  avatar.textContent = (player.name || '?')[0];

  document.getElementById('pvSubtitle').textContent = `#${roster.indexOf(player) + 1} · ${player.name || '(이름 없음)'}`;

  const SQUAD_LABELS = { basic: '기본', attack: '공격', defense: '수비' };
  const cards = document.getElementById('pvCards');
  cards.innerHTML = '';

  ['basic', 'attack', 'defense'].forEach(type => {
    const sq = squads[type];
    const pos = sq.positions[playerId];

    const card = document.createElement('div');
    card.className = 'pv-squad-card';

    const header = document.createElement('div');
    header.className = 'pv-squad-header';
    header.textContent = `${SQUAD_LABELS[type]} 스쿼드`;
    card.appendChild(header);

    const body = document.createElement('div');
    body.className = 'pv-squad-body';

    // mini field
    const fieldWrap = document.createElement('div');
    fieldWrap.className = 'pv-field-wrap';

    const field = document.createElement('div');
    field.className = 'pv-mini-field';
    field.style.width  = MINI_W + 'px';
    field.style.height = MINI_H + 'px';

    // render all players as dots
    Object.entries(sq.positions).forEach(([pid, p]) => {
      const dot = document.createElement('div');
      const isSelf = parseInt(pid) === playerId;
      dot.className = 'pv-mini-dot ' + (isSelf ? 'self' : 'other');
      dot.style.left = (p.x * MINI_SCALE) + 'px';
      dot.style.top  = (p.y * MINI_SCALE) + 'px';
      if (isSelf) {
        const r = roster.find(r => r.id === playerId);
        dot.style.background = r ? r.color : '#4fc3f7';
      }
      field.appendChild(dot);
    });
    fieldWrap.appendChild(field);

    // zone badge
    if (pos) {
      const badge = document.createElement('div');
      badge.className = 'pv-zone-badge';
      badge.textContent = describeZone(pos.x, pos.y);
      fieldWrap.appendChild(badge);
    } else {
      const badge = document.createElement('div');
      badge.className = 'pv-zone-badge';
      badge.style.color = '#888';
      badge.textContent = '배치 없음';
      fieldWrap.appendChild(badge);
    }

    body.appendChild(fieldWrap);

    // notes block
    const noteBlock = document.createElement('div');
    noteBlock.className = 'pv-note-block';

    const teamNoteLabel = document.createElement('div');
    teamNoteLabel.className = 'pv-note-label';
    teamNoteLabel.textContent = '팀 전체 지침';
    noteBlock.appendChild(teamNoteLabel);

    const teamNoteText = document.createElement('div');
    teamNoteText.className = sq.teamNote ? 'pv-note-text' : 'pv-note-empty';
    teamNoteText.textContent = sq.teamNote || '(없음)';
    noteBlock.appendChild(teamNoteText);

    const playerNoteLabel = document.createElement('div');
    playerNoteLabel.className = 'pv-note-label';
    playerNoteLabel.textContent = '개인 지침';
    noteBlock.appendChild(playerNoteLabel);

    const playerNote = sq.playerNotes[playerId] || '';
    const playerNoteText = document.createElement('div');
    playerNoteText.className = playerNote ? 'pv-note-text' : 'pv-note-empty';
    playerNoteText.textContent = playerNote || '(없음)';
    noteBlock.appendChild(playerNoteText);

    body.appendChild(noteBlock);
    card.appendChild(body);
    cards.appendChild(card);
  });
}

  if (e.target === document.getElementById('playerViewModal')) closePlayerView();

// ═══════════════════════════════════════════════════════════════
// LOCAL STORAGE AUTO-SAVE
// ═══════════════════════════════════════════════════════════════
const LS_KEY = 'squad-maker-v1';
let _saveTimer = null;

function autoSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify(buildStateSnap()));
    } catch {}
  }, 600);
}

function loadFromLocalStorage() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);
    if (!state || state.v !== 1) return false;
    applyState(state);
    return true;
  } catch { return false; }
}

// Hook auto-save into all state-mutating functions
const wrapAutoSave = fn => (...args) => { const r = fn(...args); autoSave(); return r; };
saveTeamNote   = wrapAutoSave(saveTeamNote);
savePlayerNote = wrapAutoSave(savePlayerNote);
ctxColor       = wrapAutoSave(ctxColor);
ctxRename      = wrapAutoSave(ctxRename);
ctxRemove      = wrapAutoSave(ctxRemove);

document.getElementById('teamName').addEventListener('input', autoSave);

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
drawHtmlField();

if (loadFromURL()) {
  refreshUI();
  document.getElementById('readonlyBanner').classList.add('visible');
} else if (!loadFromLocalStorage()) {
  initAllSquads();
}
