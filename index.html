<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스쿼드 메이커 — 축구 포메이션 & 전술 공유</title>
<meta name="description" content="축구 스쿼드를 직접 만들고 팀원과 공유하세요. 포메이션 설정, 선수 배치, 전술 지침을 손쉽게 작성하고 링크로 공유할 수 있습니다.">

<meta property="og:type"        content="website">
<meta property="og:title"       content="스쿼드 메이커 — 축구 포메이션 & 전술 공유">
<meta property="og:description" content="축구 스쿼드를 직접 만들고 팀원과 공유하세요. 포메이션 설정, 선수 배치, 전술 지침을 손쉽게 작성하고 링크로 공유할 수 있습니다.">
<meta property="og:url"         content="https://jaywapp.github.io/squad-maker/">
<meta property="og:image"       content="https://jaywapp.github.io/squad-maker/og-image.png">
<meta property="og:locale"      content="ko_KR">

<meta name="twitter:card"        content="summary_large_image">
<meta name="twitter:title"       content="스쿼드 메이커 — 축구 포메이션 & 전술 공유">
<meta name="twitter:description" content="포메이션 설정, 선수 배치, 전술 지침을 만들고 링크로 공유하세요.">
<meta name="twitter:image"       content="https://jaywapp.github.io/squad-maker/og-image.png">
<!-- Favicon (SVG 인라인) -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23276d41'/><text y='24' x='4' font-size='22'>⚽</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23276d41'/><text y='24' x='4' font-size='22'>⚽</text></svg>">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0f172a;
  color: #f1f5f9;
  font-family: 'Segoe UI', Tahoma, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 16px 40px;
  gap: 10px;
}

h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; }

/* ── 팀 설정 카드 ── */
.team-setup {
  width: 480px;
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.setup-row { display: flex; align-items: center; gap: 8px; }
.setup-label { font-size: 0.75rem; font-weight: 700; color: #64748b; white-space: nowrap; }
.team-name-input {
  flex: 1;
  padding: 7px 12px;
  border: 1px solid #334155; border-radius: 8px;
  background: #0f172a; color: white; font-size: 0.9rem; outline: none;
}
.team-name-input:focus { border-color: #60a5fa; }
.team-name-input::placeholder { color: #334155; }

/* ── 인원수 pills ── */
.mode-pills {
  display: flex; flex-wrap: wrap;
  background: #0f172a; border: 1px solid #334155; border-radius: 8px; overflow: hidden;
  flex: 1;
}
.mode-pill {
  flex: 1;
  padding: 6px 4px; border: none; background: none;
  color: #64748b; font-size: 0.75rem; font-weight: 700; cursor: pointer;
  transition: background 0.15s, color 0.15s; white-space: nowrap; text-align: center;
}
.mode-pill:not(:last-child) { border-right: 1px solid #334155; }
.mode-pill.active { background: #3b82f6; color: white; }

/* ── 포메이션 셀렉트 ── */
.formation-select {
  padding: 6px 10px; border: 1px solid #334155; border-radius: 8px;
  background: #0f172a; color: white; font-size: 0.82rem; font-weight: 600;
  outline: none; cursor: pointer;
}

/* ── 스쿼드 서브탭 ── */
.squad-tabs {
  display: flex; width: 480px;
  background: #1e293b; border: 1px solid #334155; border-radius: 10px; overflow: hidden;
}
.squad-tab {
  flex: 1; padding: 10px 6px; border: none; background: none;
  color: #64748b; font-size: 0.82rem; font-weight: 700; cursor: pointer;
  transition: background 0.15s, color 0.15s; text-align: center;
}
.squad-tab:not(:last-child) { border-right: 1px solid #334155; }
.squad-tab[data-squad="basic"].active   { background: #1d4ed8; color: white; }
.squad-tab[data-squad="attack"].active  { background: #c2410c; color: white; }
.squad-tab[data-squad="defense"].active { background: #1e40af; color: white; }

/* ── 포메이션 바 ── */
.formation-bar {
  display: flex; align-items: center; justify-content: space-between;
  width: 480px; gap: 8px;
}
.squad-badge {
  font-size: 0.78rem; font-weight: 700; padding: 4px 12px;
  border-radius: 20px; white-space: nowrap;
}
.squad-badge.basic   { background: #1d4ed8; color: white; }
.squad-badge.attack  { background: #c2410c; color: white; }
.squad-badge.defense { background: #1e40af; color: white; }

/* ── Field ── */
#fieldWrapper {
  position: relative; width: 480px; height: 660px; flex-shrink: 0;
}
#field {
  position: absolute; top: 0; left: 0;
  width: 480px; height: 660px; border-radius: 6px;
  background: #276d41; box-shadow: 0 8px 32px rgba(0,0,0,0.6); overflow: hidden;
}
#field::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(
    to bottom, transparent 0, transparent 44px,
    rgba(0,0,0,0.07) 44px, rgba(0,0,0,0.07) 88px
  );
  pointer-events: none; z-index: 0;
}
.fl { position:absolute; background:rgba(255,255,255,0.8); pointer-events:none; z-index:1; }
.fc { position:absolute; border:2px solid rgba(255,255,255,0.8); border-radius:50%; pointer-events:none; z-index:1; }
.fd { position:absolute; background:rgba(255,255,255,0.8); border-radius:50%; pointer-events:none; z-index:1; }

/* ── Players ── */
.player {
  position:absolute; width:60px; text-align:center;
  transform:translate(-50%,-50%);
  cursor:grab; user-select:none; z-index:10; touch-action:none;
}
.player.dragging { cursor:grabbing; z-index:50; }
.player-circle {
  width:44px; height:44px; border-radius:50%; margin:0 auto;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:0.85rem;
  border:2.5px solid rgba(255,255,255,0.9); color:white;
  box-shadow:0 3px 10px rgba(0,0,0,0.5); transition:transform 0.1s;
}
.player-circle:hover { transform:scale(1.08); }
.player-name {
  font-size:0.65rem; font-weight:600; color:white;
  text-shadow:0 1px 4px rgba(0,0,0,1); margin-top:3px;
  white-space:nowrap; max-width:68px; overflow:hidden; text-overflow:ellipsis;
}

/* ── Controls ── */
.controls { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
.btn {
  padding:9px 16px; border:none; border-radius:8px;
  cursor:pointer; font-size:0.85rem; font-weight:600;
  transition:opacity 0.15s, transform 0.1s;
}
.btn:hover  { opacity:0.85; transform:translateY(-1px); }
.btn:active { transform:translateY(0); }
.btn-green  { background:#22c55e; color:white; }
.btn-blue   { background:#3b82f6; color:white; }
.btn-slate  { background:#475569; color:white; }
.btn-orange { background:#f97316; color:white; }

/* ── Context menu ── */
#ctxMenu {
  position:fixed; background:#1e293b; border:1px solid #334155;
  border-radius:10px; padding:10px; z-index:1000; display:none;
  box-shadow:0 8px 24px rgba(0,0,0,0.6); min-width:168px;
}
#ctxMenu.visible { display:block; }
.ctx-label { font-size:0.72rem; color:#94a3b8; margin-bottom:8px; font-weight:600; }
.color-palette { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.swatch {
  width:24px; height:24px; border-radius:50%; cursor:pointer;
  border:2px solid transparent; transition:transform 0.1s;
}
.swatch:hover { transform:scale(1.25); border-color:white; }
.swatch.active { border-color:white; transform:scale(1.2); }
.ctx-btn {
  display:block; width:100%; padding:7px 10px;
  background:none; border:none; color:#f1f5f9;
  text-align:left; cursor:pointer; font-size:0.85rem;
  border-radius:6px; transition:background 0.1s;
}
.ctx-btn:hover { background:#334155; }
.ctx-btn.danger { color:#f87171; }
.ctx-divider { height:1px; background:#334155; margin:6px 0; }

/* ── Notes ── */
.notes-wrap {
  width:480px; display:flex; flex-direction:column; gap:10px;
}
.notes-card {
  background:#1e293b; border:1px solid #334155; border-radius:12px; padding:14px;
}
.notes-card-title {
  font-size:0.72rem; font-weight:700; color:#64748b;
  text-transform:uppercase; letter-spacing:0.05em; margin-bottom:10px;
}
.notes-textarea {
  width:100%; padding:10px 12px;
  border:1px solid #334155; border-radius:8px;
  background:#0f172a; color:#e2e8f0;
  font-size:0.85rem; font-family:inherit; line-height:1.6;
  outline:none; resize:vertical; min-height:76px;
  transition:border-color 0.15s;
}
.notes-textarea:focus { border-color:#475569; }
.notes-textarea::placeholder { color:#1e3a5f; }

.player-note-list { display:flex; flex-direction:column; gap:8px; }
.player-note-row { display:flex; flex-direction:column; gap:4px; }
.player-note-header {
  display:flex; align-items:center; gap:7px;
  font-size:0.78rem; font-weight:600; color:#94a3b8;
}
.player-note-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.player-note-input {
  width:100%; padding:7px 10px;
  border:1px solid #1e293b; border-radius:6px;
  background:#0f172a; color:#cbd5e1;
  font-size:0.8rem; font-family:inherit; line-height:1.5;
  outline:none; resize:none; height:48px;
  transition:border-color 0.15s;
}
.player-note-input:focus { border-color:#334155; }
.player-note-input::placeholder { color:#1e3a5f; }

/* ── Share modal ── */
#shareModal {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.75); z-index:2000;
  align-items:flex-start; justify-content:center;
  padding:20px 12px; overflow-y:auto;
}
#shareModal.visible { display:flex; }
.share-box {
  background:#1e293b; border:1px solid #334155; border-radius:14px;
  width:100%; max-width:480px; padding:20px;
  display:flex; flex-direction:column; gap:14px;
}
.share-box h3 { font-size:1rem; font-weight:700; }
.share-text {
  background:#0f172a; border:1px solid #334155; border-radius:8px;
  padding:14px; font-size:0.8rem; color:#cbd5e1;
  white-space:pre-wrap; word-break:break-word;
  max-height:50vh; overflow-y:auto; line-height:1.7;
  font-family:'Segoe UI', Tahoma, monospace;
}
.share-actions { display:flex; gap:8px; flex-wrap:wrap; }

/* ── 선수 시점 모달 ── */
#playerViewModal {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.8); z-index:2000;
  align-items:flex-start; justify-content:center;
  padding:16px; overflow-y:auto;
}
#playerViewModal.visible { display:flex; }
.pv-box {
  background:#0f172a; border:1px solid #334155; border-radius:16px;
  width:100%; max-width:480px; display:flex; flex-direction:column; overflow:hidden;
}
.pv-header {
  display:flex; align-items:center; gap:12px;
  padding:18px 20px; background:#1e293b; border-bottom:1px solid #334155;
}
.pv-avatar {
  width:48px; height:48px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:1.1rem; color:white;
  border:2.5px solid rgba(255,255,255,0.3);
}
.pv-header-info { flex:1; }
.pv-header-name { font-size:1.1rem; font-weight:800; }
.pv-header-num  { font-size:0.78rem; color:#64748b; margin-top:2px; }
.pv-close { background:none; border:none; color:#64748b; font-size:1.4rem; cursor:pointer; padding:4px; line-height:1; }
.pv-close:hover { color:#f87171; }
.pv-selector-wrap {
  padding:12px 20px; background:#1e293b; border-bottom:1px solid #334155;
  display:flex; align-items:center; gap:10px;
}
.pv-selector-wrap label { font-size:0.75rem; color:#64748b; font-weight:600; white-space:nowrap; }
.pv-selector {
  flex:1; padding:7px 10px;
  background:#0f172a; border:1px solid #334155; border-radius:8px;
  color:white; font-size:0.85rem; outline:none; cursor:pointer;
}
.pv-squads { padding:16px 20px; display:flex; flex-direction:column; gap:14px; }
.pv-squad-card { background:#1e293b; border:1px solid #334155; border-radius:12px; overflow:hidden; }
.pv-squad-header {
  display:flex; align-items:center; gap:8px;
  padding:10px 14px; border-bottom:1px solid #334155;
}
.pv-squad-title { font-size:0.82rem; font-weight:700; }
.pv-squad-form  { font-size:0.72rem; color:#64748b; margin-left:auto; }
.pv-squad-body  { padding:12px 14px; display:flex; flex-direction:column; gap:10px; }
.pv-field-wrap  { display:flex; gap:14px; align-items:flex-start; }
.pv-mini-field {
  position:relative; flex-shrink:0; width:140px; height:192px;
  border-radius:4px; background:#276d41; overflow:hidden;
  border:1px solid rgba(255,255,255,0.15);
}
.pv-mini-field::before {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(to bottom,transparent 0,transparent 13px,rgba(0,0,0,0.07) 13px,rgba(0,0,0,0.07) 26px);
  pointer-events:none;
}
.pv-mini-line { position:absolute; background:rgba(255,255,255,0.45); }
.pv-mini-dot  { position:absolute; border-radius:50%; transform:translate(-50%,-50%); }
.pv-mini-dot.other { width:8px;  height:8px;  background:rgba(255,255,255,0.3); }
.pv-mini-dot.self  { width:13px; height:13px; border:2px solid white; box-shadow:0 0 0 4px rgba(250,204,21,0.35); }
.pv-info { flex:1; display:flex; flex-direction:column; gap:8px; }
.pv-zone-badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:0.72rem; font-weight:700; background:#1d4ed8; color:#93c5fd; }
.pv-note-block { display:flex; flex-direction:column; gap:4px; }
.pv-note-label { font-size:0.7rem; color:#475569; font-weight:600; }
.pv-note-text  { font-size:0.8rem; color:#cbd5e1; line-height:1.6; white-space:pre-wrap; }
.pv-note-empty { font-size:0.78rem; color:#334155; font-style:italic; }

.share-divider { height:1px; background:#334155; }
.share-link-section { display:flex; flex-direction:column; gap:8px; }
.share-link-label { font-size:0.72rem; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:0.05em; }
.share-link-row { display:flex; gap:8px; align-items:center; }
.share-url-box {
  flex:1; padding:8px 10px;
  background:#0f172a; border:1px solid #334155; border-radius:8px;
  color:#64748b; font-size:0.72rem; outline:none;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  cursor:text; user-select:all;
}

/* ── 읽기 전용 배너 ── */
#readonlyBanner {
  display:none; width:480px;
  background:#451a03; border:1px solid #f97316; border-radius:10px;
  padding:10px 14px; font-size:0.82rem; color:#fed7aa;
  text-align:center; font-weight:600;
}
#readonlyBanner.visible { display:block; }

.hint { font-size:0.72rem; color:#334155; }
</style>
</head>
<body>

<h1>⚽ 스쿼드 메이커</h1>

<!-- 공유 링크로 열린 경우 안내 배너 -->
<div id="readonlyBanner">
  📤 공유된 스쿼드를 보고 있습니다. 수정은 본인 기기에만 적용됩니다.
</div>

<!-- 팀 설정 -->
<div class="team-setup">
  <div class="setup-row">
    <span class="setup-label">팀명</span>
    <input class="team-name-input" id="teamName" type="text" placeholder="팀 이름 입력..." maxlength="20" />
  </div>
  <div class="setup-row">
    <span class="setup-label">인원</span>
    <div class="mode-pills" id="modePills"></div>
  </div>
</div>

<!-- 스쿼드 탭 -->
<div class="squad-tabs">
  <button class="squad-tab active" data-squad="basic"   onclick="switchSquad('basic')">🔵 기본 스쿼드</button>
  <button class="squad-tab"        data-squad="attack"  onclick="switchSquad('attack')">⚔️ 공격 스쿼드</button>
  <button class="squad-tab"        data-squad="defense" onclick="switchSquad('defense')">🛡 수비 스쿼드</button>
</div>

<!-- 포메이션 바 -->
<div class="formation-bar">
  <span class="squad-badge basic" id="squadBadge">🔵 기본</span>
  <select class="formation-select" id="formationSelect" onchange="onFormationChange()"></select>
  <button class="btn btn-slate" style="padding:6px 12px;font-size:0.8rem;" onclick="resetLayout()">↺ 초기화</button>
</div>

<!-- 필드 -->
<div id="fieldWrapper">
  <div id="field"></div>
</div>

<!-- 선수 컨트롤 -->
<div class="controls">
  <button class="btn btn-blue"  onclick="addPlayer()">+ 선수 추가</button>
  <button class="btn btn-green" onclick="saveImage()">📸 이미지 저장</button>
</div>

<!-- 지침 입력 -->
<div class="notes-wrap" id="notesWrap">
  <div class="notes-card">
    <div class="notes-card-title" id="teamNoteLabel">🔵 기본 스쿼드 — 전체 지침</div>
    <textarea class="notes-textarea" id="teamNote"
      placeholder="팀 전체에게 전달할 전술 지침..."
      oninput="saveTeamNote()"></textarea>
  </div>
  <div class="notes-card">
    <div class="notes-card-title">개별 선수 지침</div>
    <div class="player-note-list" id="playerNotes"></div>
  </div>
</div>

<p class="hint">드래그: 위치 이동 &nbsp;|&nbsp; 더블클릭: 이름 수정 &nbsp;|&nbsp; 우클릭: 색상·삭제</p>

<!-- 공유 버튼 -->
<div class="controls">
  <button class="btn btn-orange" onclick="openShare()">📤 단톡방 공유 텍스트 생성</button>
  <button class="btn btn-blue"   onclick="openPlayerView(null)">👤 선수 시점 보기</button>
  <button class="btn btn-green"  onclick="saveSquadFile()">💾 파일 저장</button>
  <button class="btn btn-slate"  onclick="document.getElementById('sqFileInput').click()">📂 파일 불러오기</button>
</div>
<input type="file" id="sqFileInput" accept=".sq" style="display:none" onchange="loadSquadFile(event)">

<!-- 선수 시점 모달 -->
<div id="playerViewModal">
  <div class="pv-box">
    <div class="pv-header">
      <div class="pv-avatar" id="pvAvatar"></div>
      <div class="pv-header-info">
        <div class="pv-selector-wrap">
          <select class="pv-selector" id="pvSelector" onchange="onPvSelect()"></select>
        </div>
        <div id="pvSubtitle" style="font-size:12px;color:#aaa;margin-top:4px;"></div>
      </div>
      <button class="btn btn-slate" onclick="closePlayerView()" style="margin-left:auto;padding:4px 10px;font-size:13px;">✕</button>
    </div>
    <div id="pvCards"></div>
  </div>
</div>

<!-- 컨텍스트 메뉴 -->
<div id="ctxMenu">
  <div class="ctx-label">색상</div>
  <div class="color-palette" id="colorPalette"></div>
  <div class="ctx-divider"></div>
  <button class="ctx-btn" onclick="ctxPlayerView()">👤 선수 시점 보기</button>
  <button class="ctx-btn" onclick="ctxRename()">✏️ 이름 변경</button>
  <button class="ctx-btn danger" onclick="ctxRemove()">🗑️ 삭제</button>
</div>

<!-- 공유 모달 -->
<div id="shareModal">
  <div class="share-box">
    <h3>📤 단톡방 공유 텍스트</h3>
    <div class="share-text" id="shareText"></div>
    <div class="share-actions">
      <button class="btn btn-blue" onclick="copyShareText()">📋 텍스트 복사</button>
      <button class="btn btn-slate" onclick="saveShareTxt()">💾 파일 저장</button>
      <button class="btn btn-slate" onclick="closeShare()">✕ 닫기</button>
    </div>

  '11v11':{ label:'11vs11',max:11, formations:{

    '4-2-3-1': [{count:4,y:520,pre:'수비'},{count:2,y:415,pre:'수비형MF'},{count:3,y:305,pre:'공격형MF'},{count:1,y:200,pre:'공격'}],
    '5-3-2':   [{count:5,y:510,pre:'수비'},{count:3,y:370,pre:'미드'},{count:2,y:230,pre:'공격'}],

  }},
};

const SQUAD_META = {
  basic:   { label:'기본 스쿼드', icon:'🔵', badge:'basic',   notePrefix:'🔵 기본' },
  attack:  { label:'공격 스쿼드', icon:'⚔️', badge:'attack',  notePrefix:'⚔️ 공격' },
  defense: { label:'수비 스쿼드', icon:'🛡', badge:'defense', notePrefix:'🛡 수비' },
};

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let currentMode   = '9v9';
let currentSquad  = 'basic';  // 'basic' | 'attack' | 'defense'
let selectedPlayer = null;
let dragState      = null;
let nextId         = 1;

// 공유 명단 (이름·색상만, 전 스쿼드 공유)
// roster[i] = { id, name, color }
let roster = [];

// 스쿼드별 데이터
// squads[type] = { formation, positions: { id: {x,y} }, teamNote, playerNotes: { id: '' } }
const squads = {
  basic:   { formation: '3-3-2', positions: {}, teamNote: '', playerNotes: {} },
  attack:  { formation: '3-2-3', positions: {}, teamNote: '', playerNotes: {} },
  defense: { formation: '4-3-1', positions: {}, teamNote: '', playerNotes: {} },
};

// 현재 화면에 표시되는 players (roster + 현 스쿼드 positions 합성)
function getPlayers() {
  const pos = squads[currentSquad].positions;
  return roster.map(r => ({ ...r, x: pos[r.id]?.x ?? 240, y: pos[r.id]?.y ?? 330 }));
}

// ═══════════════════════════════════════════════════════════════
// FORMATION HELPERS
// ═══════════════════════════════════════════════════════════════
function rowX(count, i) { return Math.round(20 + (i + 1) * 440 / (count + 1)); }

function defaultPositions(modeKey, formKey) {
  // Returns { id: {x,y} } based on roster order
  const rows = MODES_CONFIG[modeKey].formations[formKey];
  const coords = [{ x: 240, y: 622 }]; // GK
  rows.forEach(row => {
    for (let i = 0; i < row.count; i++)
      coords.push({ x: rowX(row.count, i), y: row.y });
  });
  const result = {};
  roster.forEach((r, i) => {
    if (coords[i]) result[r.id] = { ...coords[i] };
  });
  return result;
}

function defaultRoster(modeKey, formKey) {
  const rows = MODES_CONFIG[modeKey].formations[formKey];
  const list = [{ id: 1, name: 'GK', color: '#E53935' }];
  let id = 2;
  rows.forEach(row => {
    for (let i = 0; i < row.count; i++)
      list.push({ id: id++, name: `${row.pre}${i+1}`, color: '#1E88E5' });
  });
  return list;
}

// ═══════════════════════════════════════════════════════════════
// MODE CHANGE (인원수)
// ═══════════════════════════════════════════════════════════════
function buildModePills() {
  document.getElementById('modePills').innerHTML =
    Object.entries(MODES_CONFIG).map(([k, c]) =>
      `<button class="mode-pill${k===currentMode?' active':''}" onclick="onModeChange('${k}')">${c.label}</button>`
    ).join('');
}

function onModeChange(k) {
  if (k === currentMode) return;
  const hasNotes = Object.values(squads).some(sq =>
    sq.teamNote.trim() || Object.values(sq.playerNotes).some(n => n.trim())
  );
  if (hasNotes && !confirm('인원수를 변경하면 모든 스쿼드와 지침이 초기화됩니다. 계속하시겠습니까?')) return;

  currentMode = k;
  buildModePills();
  initAllSquads();
}

function initAllSquads() {
  // Build default roster from current mode's first formation
  const defaultForm = Object.keys(MODES_CONFIG[currentMode].formations)[0];
  roster = defaultRoster(currentMode, defaultForm);
  nextId = roster.length + 1;

  // Reset all squad data
  const formKeys = {
    basic:   Object.keys(MODES_CONFIG[currentMode].formations)[0],
    attack:  Object.keys(MODES_CONFIG[currentMode].formations)[Math.min(1, Object.keys(MODES_CONFIG[currentMode].formations).length-1)],
    defense: Object.keys(MODES_CONFIG[currentMode].formations)[Math.min(2, Object.keys(MODES_CONFIG[currentMode].formations).length-1)],
  };
  ['basic','attack','defense'].forEach(type => {
    squads[type].formation  = formKeys[type];
    squads[type].positions  = defaultPositions(currentMode, formKeys[type]);
    squads[type].teamNote   = '';
    squads[type].playerNotes = {};
  });

  buildFormationSelect();
  document.getElementById('formationSelect').value = squads[currentSquad].formation;
  renderPlayers();
  renderNotesPanel();
}

// ═══════════════════════════════════════════════════════════════
// SQUAD SWITCHING
// ═══════════════════════════════════════════════════════════════
function saveCurrentNotes() {
  squads[currentSquad].teamNote = document.getElementById('teamNote').value;
  const players = getPlayers();
  players.forEach(p => {
    const el = document.getElementById('pnote_' + p.id);
    if (el) squads[currentSquad].playerNotes[p.id] = el.value;
  });
}

function switchSquad(type) {
  if (type === currentSquad) return;
  saveCurrentNotes();
  currentSquad = type;

  // Update tab highlight
  document.querySelectorAll('.squad-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.squad === type)
  );

  // Update badge
  const meta = SQUAD_META[type];
  const badge = document.getElementById('squadBadge');
  badge.textContent = `${meta.icon} ${meta.label.replace(' 스쿼드','')}`;
  badge.className = `squad-badge ${type}`;

  // Update note label
  document.getElementById('teamNoteLabel').textContent =
    `${meta.icon} ${meta.label} — 전체 지침`;

  buildFormationSelect();
  document.getElementById('formationSelect').value = squads[type].formation;
  renderPlayers();
  renderNotesPanel();
}

// ═══════════════════════════════════════════════════════════════
// FORMATION SELECT
// ═══════════════════════════════════════════════════════════════
function buildFormationSelect() {
  document.getElementById('formationSelect').innerHTML =
    Object.keys(MODES_CONFIG[currentMode].formations)
      .map(f => `<option value="${f}">${f}</option>`).join('');
}

function onFormationChange() {
  const form = document.getElementById('formationSelect').value;
  squads[currentSquad].formation = form;
  // Recalculate default positions, preserving existing overrides
  const defaults = defaultPositions(currentMode, form);
  // Only reset positions (keep names from roster)
  squads[currentSquad].positions = defaults;
  renderPlayers();
}

function resetLayout() {
  squads[currentSquad].positions = defaultPositions(currentMode, squads[currentSquad].formation);
  renderPlayers();
}

function addPlayer() {
  const max = MODES_CONFIG[currentMode].max;
  if (roster.length >= max) {
    alert(`${MODES_CONFIG[currentMode].label} 모드는 최대 ${max}명입니다.`); return;
  }
  const newP = { id: nextId++, name: `선수${roster.length+1}`, color: '#1E88E5' };
  roster.push(newP);
  // Give default position in all squads
  ['basic','attack','defense'].forEach(type => {
    squads[type].positions[newP.id] = { x: 240, y: 330 };
  });
  renderPlayers();
  renderNotesPanel();
}

// ═══════════════════════════════════════════════════════════════
// HTML FIELD LINES
// ═══════════════════════════════════════════════════════════════
function drawHtmlField() {
  const f = document.getElementById('field');
  f.querySelectorAll('.fl,.fc,.fd').forEach(e => e.remove());
  const L=(x,y,w,h)=>{const e=document.createElement('div');e.className='fl';e.style.cssText=`left:${x}px;top:${y}px;width:${w}px;height:${h}px;`;f.appendChild(e);};
  const C=(cx,cy,r)=>{const e=document.createElement('div');e.className='fc';e.style.cssText=`left:${cx-r}px;top:${cy-r}px;width:${r*2}px;height:${r*2}px;`;f.appendChild(e);};
  const D=(cx,cy,r)=>{const e=document.createElement('div');e.className='fd';e.style.cssText=`left:${cx-r}px;top:${cy-r}px;width:${r*2}px;height:${r*2}px;`;f.appendChild(e);};
  L(20,20,440,2);L(20,638,440,2);L(20,20,2,620);L(458,20,2,620);
  L(20,330,440,2);C(240,330,60);D(240,330,4);
  L(130,558,220,2);L(130,558,2,82);L(348,558,2,82);
  L(184,598,112,2);L(184,598,2,42);L(294,598,2,42);D(240,530,3);
  L(194,638,92,8);L(194,638,2,10);L(284,638,2,10);
  L(130,100,220,2);L(130,20,2,82);L(348,20,2,82);
  L(184,60,112,2);L(184,20,2,42);L(294,20,2,42);D(240,128,3);
  L(194,12,92,8);L(194,12,2,10);L(284,12,2,10);
}

// ═══════════════════════════════════════════════════════════════
// PLAYER RENDERING
// ═══════════════════════════════════════════════════════════════
function renderPlayers() {
  const f = document.getElementById('field');
  f.querySelectorAll('.player').forEach(e => e.remove());
  getPlayers().forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'player';
    el.dataset.id = p.id;
    el.style.left = p.x + 'px';
    el.style.top  = p.y + 'px';
    el.innerHTML = `
      <div class="player-circle" style="background:${p.color};">${i+1}</div>
      <div class="player-name">${escHtml(p.name)}</div>`;
    el.addEventListener('dblclick', e => { e.stopPropagation(); startInlineEdit(el, p); });
    el.addEventListener('contextmenu', e => { e.preventDefault(); e.stopPropagation(); showCtxMenu(e.clientX, e.clientY, p); });
    f.appendChild(el);
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function startInlineEdit(playerEl, player) {
  const nameEl = playerEl.querySelector('.player-name');
  const original = player.name;
  const input = document.createElement('input');
  input.type = 'text'; input.value = original; input.maxLength = 12;
  input.style.cssText = `width:64px;font-size:0.65rem;font-weight:600;text-align:center;
    background:rgba(0,0,0,0.7);color:white;border:1px solid #60a5fa;border-radius:4px;
    padding:1px 4px;outline:none;margin-top:3px;font-family:inherit;`;
  nameEl.replaceWith(input);
  input.select(); input.focus();
  const commit = () => {
    const newName = input.value.trim().slice(0,12) || original;
    // Sync name across all roster entries (shared)
    const r = roster.find(r => r.id === player.id);
    if (r) r.name = newName;
    renderPlayers();
    renderNotesPanel();
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key==='Enter') { e.preventDefault(); input.blur(); }
    if (e.key==='Escape') { input.value=original; input.blur(); }
    e.stopPropagation();
  });
  input.addEventListener('mousedown', e => e.stopPropagation());
}

// ═══════════════════════════════════════════════════════════════
// DRAG
// ═══════════════════════════════════════════════════════════════
const fieldEl = document.getElementById('field');

fieldEl.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  const pe = e.target.closest('.player');
  if (!pe) return;
  const id = Number(pe.dataset.id);
  const p = getPlayers().find(p => p.id === id);
  if (!p) return;
  hideCtxMenu();
  dragState = { id, el: pe, sx: e.clientX, sy: e.clientY, px: p.x, py: p.y };
  pe.classList.add('dragging');
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!dragState) return;
  const x = Math.max(26, Math.min(FIELD_W-26, dragState.px + e.clientX - dragState.sx));
  const y = Math.max(26, Math.min(FIELD_H-26, dragState.py + e.clientY - dragState.sy));
  squads[currentSquad].positions[dragState.id] = { x, y };
  dragState.el.style.left = x+'px';
  dragState.el.style.top  = y+'px';
});
document.addEventListener('mouseup', () => {
  if (dragState) { dragState.el.classList.remove('dragging'); dragState = null; }
});

fieldEl.addEventListener('touchstart', e => {
  const pe = e.target.closest('.player');
  if (!pe) return;
  const id = Number(pe.dataset.id);
  const p = getPlayers().find(p => p.id === id);
  if (!p) return;
  const t = e.touches[0];
  dragState = { id, el: pe, sx: t.clientX, sy: t.clientY, px: p.x, py: p.y };
  pe.classList.add('dragging'); e.preventDefault();
}, { passive: false });
document.addEventListener('touchmove', e => {
  if (!dragState) return;
  const t = e.touches[0];
  const x = Math.max(26, Math.min(FIELD_W-26, dragState.px + t.clientX - dragState.sx));
  const y = Math.max(26, Math.min(FIELD_H-26, dragState.py + t.clientY - dragState.sy));
  squads[currentSquad].positions[dragState.id] = { x, y };
  dragState.el.style.left = x+'px';
  dragState.el.style.top  = y+'px';
  e.preventDefault();
}, { passive: false });
document.addEventListener('touchend', () => {
  if (dragState) { dragState.el.classList.remove('dragging'); dragState = null; }
});

// ═══════════════════════════════════════════════════════════════
// CONTEXT MENU
// ═══════════════════════════════════════════════════════════════
function showCtxMenu(x, y, player) {
  selectedPlayer = player;
  document.getElementById('colorPalette').innerHTML = COLORS.map(c =>
    `<div class="swatch${c===player.color?' active':''}"
         style="background:${c};${c==='#ffffff'?'border-color:#475569;':''}"
         onclick="ctxColor('${c}')"></div>`
  ).join('');
  const m = document.getElementById('ctxMenu');
  m.style.left = Math.min(x, innerWidth-180)+'px';
  m.style.top  = Math.min(y, innerHeight-180)+'px';
  m.classList.add('visible');
}
function hideCtxMenu() { document.getElementById('ctxMenu').classList.remove('visible'); }
document.addEventListener('click', e => { if (!e.target.closest('#ctxMenu')) hideCtxMenu(); });
document.addEventListener('contextmenu', e => { if (!e.target.closest('.player')) hideCtxMenu(); });

function ctxColor(c) {
  if (!selectedPlayer) return;
  // Sync color across roster (shared)
  const r = roster.find(r => r.id === selectedPlayer.id);
  if (r) r.color = c;
  renderPlayers(); renderNotesPanel(); hideCtxMenu();
}
function ctxRename() {
  if (!selectedPlayer) return;
  const n = prompt('선수 이름:', selectedPlayer.name);
  if (n !== null) {
    const r = roster.find(r => r.id === selectedPlayer.id);
    if (r) r.name = n.trim().slice(0,12) || selectedPlayer.name;
    renderPlayers(); renderNotesPanel();
  }
  hideCtxMenu();
}
function ctxRemove() {
  if (!selectedPlayer) return;
  if (roster.length <= 1) { alert('선수가 1명 이하면 삭제할 수 없습니다.'); return; }
  const id = selectedPlayer.id;
  roster = roster.filter(r => r.id !== id);
  ['basic','attack','defense'].forEach(type => {
    delete squads[type].positions[id];
    delete squads[type].playerNotes[id];
  });
  renderPlayers(); renderNotesPanel(); hideCtxMenu();
}

// ═══════════════════════════════════════════════════════════════
// SAVE IMAGE
// ═══════════════════════════════════════════════════════════════
function saveImage() {
  const teamName = document.getElementById('teamName').value.trim();
  const form     = squads[currentSquad].formation;
  const meta     = SQUAD_META[currentSquad];
  const f        = document.getElementById('field');
  const label    = `${teamName ? teamName + ' ' : ''}${meta.icon} ${meta.label} [${form}]`;
  const banner   = document.createElement('div');
  banner.style.cssText = `position:absolute;top:28px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,0.55);color:white;font-weight:700;font-size:14px;
    padding:5px 18px;border-radius:20px;z-index:200;white-space:nowrap;pointer-events:none;`;
  banner.textContent = label;
  f.appendChild(banner);
  html2canvas(f, { scale:2.5, backgroundColor:'#276d41', useCORS:true, logging:false })
    .then(canvas => {
      f.removeChild(banner);
      const a = document.createElement('a');
      a.download = `${teamName||'스쿼드'}_${meta.label}_${form}.png`;
      a.href = canvas.toDataURL('image/png'); a.click();
    }).catch(() => { if (banner.parentNode) f.removeChild(banner); });
}

// ═══════════════════════════════════════════════════════════════
// SHARE TEXT GENERATION
// ═══════════════════════════════════════════════════════════════
function buildShareText() {
  saveCurrentNotes();

  const teamName = document.getElementById('teamName').value.trim() || '우리팀';
  const modeLabel = MODES_CONFIG[currentMode].label;
  const line = '─'.repeat(22);

  let t = `⚽ ${teamName} 전술 공유 (${modeLabel})\n${line}\n\n`;

  // 스쿼드별 명단
  ['basic','attack','defense'].forEach(type => {
    const sq   = squads[type];
    const meta = SQUAD_META[type];
    const players = roster.map((r, i) => {
      const pos = sq.positions[r.id];
      return { ...r, x: pos?.x ?? 240, y: pos?.y ?? 330, num: i+1 };
    });
    t += `${meta.icon} ${meta.label} [${sq.formation}]\n`;
    players.forEach(p => { t += `  ${numCircle(p.num)} ${p.name}\n`; });
    t += '\n';
  });

  // 스쿼드별 전체 지침
  const hasAnyTeamNote = ['basic','attack','defense'].some(type => squads[type].teamNote.trim());
  if (hasAnyTeamNote) {
    t += `${line}\n📢 스쿼드별 전체 지침\n`;
    ['basic','attack','defense'].forEach(type => {
      const note = squads[type].teamNote.trim();
      if (!note) return;
      const meta = SQUAD_META[type];
      t += `\n${meta.icon} ${meta.label}\n${note}\n`;
    });
    t += '\n';
  }

  // 개별 선수 지침 (전 스쿼드 통합)
  // 선수별로 스쿼드별 노트 합산
  const hasAnyPlayerNote = roster.some(r =>
    ['basic','attack','defense'].some(type => (squads[type].playerNotes[r.id] || '').trim())
  );
  if (hasAnyPlayerNote) {
    t += `${line}\n👤 개별 선수 지침\n`;
    roster.forEach((r, i) => {
      const notesBySquad = ['basic','attack','defense']
        .map(type => {
          const note = (squads[type].playerNotes[r.id] || '').trim();
          return note ? `  ${SQUAD_META[type].icon} ${note}` : null;
        }).filter(Boolean);
      if (notesBySquad.length === 0) return;
      t += `\n${numCircle(i+1)} ${r.name}\n${notesBySquad.join('\n')}\n`;
    });
  }

  return t.trim();
}

function numCircle(n) {
  const circles = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪'];
  return circles[n-1] || `${n}.`;
}

let lastShareText = '';

function openShare() {
  lastShareText = buildShareText();

// ═══════════════════════════════════════════════════════════════
// URL STATE ENCODING / DECODING
// ═══════════════════════════════════════════════════════════════
function encodeState() {
  const snap = buildStateSnap();
  try {
    // URL-safe base64: replace +→- /→_ and strip padding =
    return btoa(unescape(encodeURIComponent(JSON.stringify(snap))))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  } catch { return ''; }
}

function decodeState(encoded) {
  try {
    // Restore URL-safe base64 to standard base64
    let b64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
    b64 += '=='.slice(0, (4 - b64.length % 4) % 4);
    return JSON.parse(decodeURIComponent(escape(atob(b64))));
  } catch { return null; }
}

function generateShareURL() {
  const enc = encodeState();
  if (!enc) return location.href;
  return `${location.origin}${location.pathname}#s=${enc}`;
}

function loadFromURL() {
  const match = location.hash.match(/[#&]s=([A-Za-z0-9\-_]*)/);
  if (!match) return false;
  const state = decodeState(match[1]);
  if (!state || state.v !== 1) return false;
  // Data-only restore — INIT block handles UI refresh
  document.getElementById('teamName').value = state.team || '';
  currentMode = state.mode || '9v9';
  roster = (state.roster || []).map(r => ({ id: r.id, name: r.name, color: r.color }));
  nextId = roster.length ? Math.max(...roster.map(r => r.id)) + 1 : 1;
  ['basic','attack','defense'].forEach(type => {
    const sq = state.squads?.[type];
    if (!sq) return;
    squads[type].formation   = sq.f   || Object.keys(MODES_CONFIG[currentMode].formations)[0];
    squads[type].positions   = sq.pos || {};
    squads[type].teamNote    = sq.tn  || '';
    squads[type].playerNotes = sq.pn  || {};
  });
  currentSquad = state.squad || 'basic';
  return true;
}

function copyShareUrl() {
  const url = generateShareURL();
  navigator.clipboard.writeText(url)
    .then(() => alert('링크가 복사되었습니다!\n공유받은 사람이 링크를 열면 동일한 스쿼드를 볼 수 있습니다.'))
    .catch(() => {
      const box = document.getElementById('shareUrlBox');
      box.focus();
      document.execCommand('selectAll');
      alert('자동 복사 실패 — 위 링크를 직접 선택해서 복사해주세요.');
    });
}

// ═══════════════════════════════════════════════════════════════
// FILE SAVE / LOAD (.sq)
// ═══════════════════════════════════════════════════════════════
function buildStateSnap() {
  saveCurrentNotes();
  const snap = {
    v: 1,
    team: document.getElementById('teamName').value.trim(),
    mode: currentMode,
    squad: currentSquad,
    roster: roster.map(r => ({ id: r.id, name: r.name, color: r.color })),
    squads: {},
  };
  ['basic','attack','defense'].forEach(type => {
    const sq = squads[type];
    const pos = {};
    Object.entries(sq.positions).forEach(([id, p]) => {
      pos[id] = { x: Math.round(p.x), y: Math.round(p.y) };
    });
    snap.squads[type] = { f: sq.formation, pos, tn: sq.teamNote, pn: sq.playerNotes };
  });
  return snap;
}

function saveSquadFile() {
  const snap = buildStateSnap();
  const json = JSON.stringify(snap, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const teamName = snap.team || '스쿼드';
  a.href     = url;
  a.download = `${teamName}.sq`;
  a.click();
  URL.revokeObjectURL(url);
}

function loadSquadFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const state = JSON.parse(e.target.result);
      if (!state || state.v !== 1) { alert('올바른 .sq 파일이 아닙니다.'); return; }
      applyState(state);
    } catch {
      alert('파일을 읽는 중 오류가 발생했습니다.');
    }
    // 같은 파일을 다시 불러올 수 있도록 값 초기화
    event.target.value = '';
  };
  reader.readAsText(file);
}

function applyState(state) {
  document.getElementById('teamName').value = state.team || '';
  currentMode = state.mode || '9v9';
  roster = (state.roster || []).map(r => ({ id: r.id, name: r.name, color: r.color }));
  nextId = roster.length ? Math.max(...roster.map(r => r.id)) + 1 : 1;
  ['basic','attack','defense'].forEach(type => {
    const sq = state.squads?.[type];
    if (!sq) return;
    squads[type].formation   = sq.f   || Object.keys(MODES_CONFIG[currentMode].formations)[0];
    squads[type].positions   = sq.pos || {};
    squads[type].teamNote    = sq.tn  || '';
    squads[type].playerNotes = sq.pn  || {};
  });
  currentSquad = state.squad || 'basic';
  // UI 업데이트
  document.querySelectorAll('.mode-pill').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === currentMode));
  document.querySelectorAll('.squad-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.squad === currentSquad));
  const sqBadge = document.querySelector('.squad-badge');
  if (sqBadge) { sqBadge.className = 'squad-badge ' + currentSquad; }
  const SQUAD_LABELS = { basic:'기본', attack:'공격', defense:'수비' };
  if (sqBadge) sqBadge.textContent = SQUAD_LABELS[currentSquad] + ' 스쿼드';
  const fSelect = document.getElementById('formationSelect');
  if (fSelect) {
    fSelect.innerHTML = Object.keys(MODES_CONFIG[currentMode].formations)
      .map(f => `<option value="${f}"${f === squads[currentSquad].formation ? ' selected' : ''}>${f}</option>`).join('');
  }
  drawHtmlField();
  renderPlayers();
  renderNotesPanel();
}

// ═══════════════════════════════════════════════════════════════
// PLAYER VIEW
// ═══════════════════════════════════════════════════════════════
const MINI_W = 140, MINI_H = 192;
const MINI_SCALE = MINI_W / FIELD_W;

function describeZone(x, y) {
  const hz = x < FIELD_W * 0.35 ? '좌측' : x > FIELD_W * 0.65 ? '우측' : '중앙';
  if (y >= 590) return 'GK';
  if (y >= 450) return `수비 라인 ${hz}`;
  if (y >= 300) return `미드필드 ${hz}`;
  return `공격 라인 ${hz}`;
}

function openPlayerView(playerId) {
  const modal = document.getElementById('playerViewModal');
  const sel = document.getElementById('pvSelector');
  sel.innerHTML = '';
  roster.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r.id;
    opt.textContent = r.name || '(이름 없음)';
    if (r.id === playerId) opt.selected = true;
    sel.appendChild(opt);
  });
  if (!playerId && roster.length > 0) playerId = roster[0].id;
  modal.style.display = 'flex';
  renderPlayerView(playerId);
}

function closePlayerView() {
  document.getElementById('playerViewModal').style.display = 'none';
}

function onPvSelect() {
  const id = parseInt(document.getElementById('pvSelector').value);
  renderPlayerView(id);
}

function ctxPlayerView() {
  hideCtxMenu();
  openPlayerView(selectedPlayer ? selectedPlayer.id : null);
}

function renderPlayerView(playerId) {
  const player = roster.find(r => r.id === playerId);
  if (!player) return;

  // header avatar
  const avatar = document.getElementById('pvAvatar');
  avatar.style.background = player.color || '#4fc3f7';
  avatar.textContent = (player.name || '?')[0];

  document.getElementById('pvSubtitle').textContent = `#${roster.indexOf(player) + 1} · ${player.name || '(이름 없음)'}`;

  const SQUAD_LABELS = { basic: '기본', attack: '공격', defense: '수비' };
  const cards = document.getElementById('pvCards');
  cards.innerHTML = '';

  ['basic', 'attack', 'defense'].forEach(type => {
    const sq = squads[type];
    const pos = sq.positions[playerId];

    const card = document.createElement('div');
    card.className = 'pv-squad-card';

    const header = document.createElement('div');
    header.className = 'pv-squad-header';
    header.textContent = `${SQUAD_LABELS[type]} 스쿼드`;
    card.appendChild(header);

    const body = document.createElement('div');
    body.className = 'pv-squad-body';

    // mini field
    const fieldWrap = document.createElement('div');
    fieldWrap.className = 'pv-field-wrap';

    const field = document.createElement('div');
    field.className = 'pv-mini-field';
    field.style.width  = MINI_W + 'px';
    field.style.height = MINI_H + 'px';

    // render all players as dots
    Object.entries(sq.positions).forEach(([pid, p]) => {
      const dot = document.createElement('div');
      const isSelf = parseInt(pid) === playerId;
      dot.className = 'pv-mini-dot ' + (isSelf ? 'self' : 'other');
      dot.style.left = (p.x * MINI_SCALE) + 'px';
      dot.style.top  = (p.y * MINI_SCALE) + 'px';
      if (isSelf) {
        const r = roster.find(r => r.id === playerId);
        dot.style.background = r ? r.color : '#4fc3f7';
      }
      field.appendChild(dot);
    });
    fieldWrap.appendChild(field);

    // zone badge
    if (pos) {
      const badge = document.createElement('div');
      badge.className = 'pv-zone-badge';
      badge.textContent = describeZone(pos.x, pos.y);
      fieldWrap.appendChild(badge);
    } else {
      const badge = document.createElement('div');
      badge.className = 'pv-zone-badge';
      badge.style.color = '#888';
      badge.textContent = '배치 없음';
      fieldWrap.appendChild(badge);
    }

    body.appendChild(fieldWrap);

    // notes block
    const noteBlock = document.createElement('div');
    noteBlock.className = 'pv-note-block';

    const teamNoteLabel = document.createElement('div');
    teamNoteLabel.className = 'pv-note-label';
    teamNoteLabel.textContent = '팀 전체 지침';
    noteBlock.appendChild(teamNoteLabel);

    const teamNoteText = document.createElement('div');
    teamNoteText.className = sq.teamNote ? 'pv-note-text' : 'pv-note-empty';
    teamNoteText.textContent = sq.teamNote || '(없음)';
    noteBlock.appendChild(teamNoteText);

    const playerNoteLabel = document.createElement('div');
    playerNoteLabel.className = 'pv-note-label';
    playerNoteLabel.textContent = '개인 지침';
    noteBlock.appendChild(playerNoteLabel);

    const playerNote = sq.playerNotes[playerId] || '';
    const playerNoteText = document.createElement('div');
    playerNoteText.className = playerNote ? 'pv-note-text' : 'pv-note-empty';
    playerNoteText.textContent = playerNote || '(없음)';
    noteBlock.appendChild(playerNoteText);

    body.appendChild(noteBlock);
    card.appendChild(body);
    cards.appendChild(card);
  });
}

document.getElementById('playerViewModal').addEventListener('click', e => {
  if (e.target === document.getElementById('playerViewModal')) closePlayerView();
});
